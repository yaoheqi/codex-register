<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>邮箱资源</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fafafa;
      --surface: #ffffff;
      --surface-soft: #f6f7f8;
      --line: #e2e5e9;
      --line-strong: #c6ccd4;
      --text: #181b20;
      --muted: #68707c;
      --faint: #929aa6;
      --blue: #1f6feb;
      --blue-soft: #eef5ff;
      --green: #0b7a55;
      --green-soft: #edf8f3;
      --amber: #9a6700;
      --amber-soft: #fff8dc;
      --red: #c43c3c;
      --red-soft: #fff1f1;
      --radius: 8px;
      --shadow: 0 1px 2px rgba(24, 27, 32, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      padding: 0 12px;
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: background 0.16s ease, border-color 0.16s ease, color 0.16s ease;
    }

    button:hover {
      background: var(--surface-soft);
      border-color: #9ca6b3;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.52;
      box-shadow: none;
    }

    .primary {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .primary:hover {
      background: #185abc;
      border-color: #185abc;
    }

    .danger {
      background: var(--red-soft);
      border-color: #efb1b1;
      color: var(--red);
    }

    .danger:hover {
      background: #ffe7e7;
      border-color: #df8b8b;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      outline: none;
      box-shadow: var(--shadow);
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(31, 111, 235, 0.64);
      box-shadow: 0 0 0 3px rgba(31, 111, 235, 0.12);
    }

    input,
    select {
      height: 36px;
      padding: 0 10px;
      font-size: 13px;
    }

    textarea {
      min-height: 120px;
      padding: 12px;
      resize: vertical;
      line-height: 1.55;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
    }

    h1,
    h2 {
      margin: 0;
      line-height: 1.16;
    }

    h1 {
      font-size: clamp(24px, 3vw, 34px);
      font-weight: 850;
    }

    h2 {
      font-size: 16px;
      font-weight: 820;
    }

    .page {
      width: min(1320px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(180px, 240px) minmax(0, 1fr) auto;
      align-items: center;
      gap: 16px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .subtitle {
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
    }

    .top-actions,
    .toolbar,
    .filters,
    .bulk-actions,
    .row-actions,
    .pager-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(6, minmax(70px, 1fr));
      gap: 1px;
      margin: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--line);
    }

    .stat {
      min-height: 54px;
      padding: 8px 10px;
      background: var(--surface);
    }

    .stat b {
      display: block;
      min-height: 22px;
      font-size: 20px;
      line-height: 1.1;
      font-weight: 850;
    }

    .stat span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .section {
      margin-top: 22px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .field-label {
      display: block;
      margin: 0 0 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .toolbar {
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .bulk-actions {
      color: var(--muted);
      font-size: 13px;
    }

    .bulk-actions select {
      width: 118px;
    }

    .search {
      display: grid;
      grid-template-columns: minmax(180px, 280px) auto auto;
      gap: 8px;
      align-items: center;
    }

    .filters {
      gap: 6px;
    }

    .filter {
      min-height: 32px;
      padding: 0 10px;
      font-size: 12px;
      color: var(--muted);
      box-shadow: none;
    }

    .filter.active {
      border-color: var(--blue);
      background: var(--blue-soft);
      color: var(--blue);
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    th,
    td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
      font-size: 13px;
    }

    th {
      color: var(--muted);
      background: #fbfcfd;
      font-size: 12px;
      font-weight: 760;
      white-space: nowrap;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    tr.is-selected td {
      background: #fbfdff;
    }

    .select-col {
      width: 44px;
      min-width: 44px;
    }

    .row-checkbox {
      width: 16px;
      height: 16px;
      margin: 0;
      box-shadow: none;
      vertical-align: middle;
      cursor: pointer;
    }

    .email-cell {
      min-width: 240px;
    }

    .token-cell {
      max-width: 190px;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
    }

    .time-cell {
      min-width: 150px;
      color: var(--muted);
      white-space: nowrap;
    }

    .action-cell {
      min-width: 290px;
    }

    .status-edit {
      width: 118px;
      min-width: 118px;
    }

    .copy {
      display: inline;
      min-height: auto;
      max-width: 100%;
      border: 0;
      border-radius: 4px;
      background: transparent;
      color: inherit;
      padding: 0;
      font: inherit;
      font-weight: 720;
      box-shadow: none;
      text-align: left;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .copy:hover {
      background: transparent;
      border-color: transparent;
      color: var(--blue);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 0 9px;
      font-size: 12px;
      font-weight: 760;
      white-space: nowrap;
    }

    .badge.unregistered {
      background: var(--amber-soft);
      color: var(--amber);
    }

    .badge.registered {
      background: var(--green-soft);
      color: var(--green);
    }

    .badge.received {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .badge.failed {
      background: var(--red-soft);
      color: var(--red);
    }

    .meta {
      margin-top: 5px;
      color: var(--faint);
      font-size: 12px;
      line-height: 1.4;
    }

    .empty {
      padding: 36px 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--muted);
      text-align: center;
      font-size: 13px;
    }

    .pager {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .pager select {
      width: 96px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(24, 27, 32, 0.36);
    }

    .modal-backdrop[hidden] {
      display: none;
    }

    .modal {
      width: min(640px, 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: 0 22px 58px rgba(24, 27, 32, 0.18);
    }

    .modal-head,
    .modal-body,
    .modal-actions {
      padding: 16px;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
    }

    .modal-body textarea {
      min-height: 220px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      border-top: 1px solid var(--line);
    }

    body.modal-open {
      overflow: hidden;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      max-width: min(360px, calc(100vw - 36px));
      padding: 11px 13px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(24, 27, 32, 0.92);
      color: #fff;
      font-size: 13px;
      line-height: 1.45;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 0.16s ease, transform 0.16s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 940px) {
      .page {
        width: calc(100% - 22px);
        max-width: 720px;
        padding-top: 20px;
      }

      .topbar,
      .toolbar,
      .section-head,
      .pager {
        align-items: stretch;
        grid-template-columns: 1fr;
        flex-direction: column;
      }

      .top-actions,
      .toolbar,
      .filters,
      .bulk-actions,
      .pager-actions {
        width: 100%;
      }

      .top-actions,
      .filters,
      .pager-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .top-actions button,
      .toolbar button,
      .filters button,
      .bulk-actions button,
      .bulk-actions select,
      .pager-actions button {
        width: 100%;
        min-width: 0;
      }

      .filters button:last-child {
        grid-column: 1 / -1;
      }

      .pager select {
        width: 100%;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .search {
        grid-template-columns: 1fr;
      }

      .bulk-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      #selectionCount {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div class="brand">
        <h1>邮箱资源</h1>
        <div class="subtitle">SQLite 数据源 · data/resources.sqlite3</div>
      </div>
      <section class="stats" aria-label="邮箱统计">
        <div class="stat"><b id="statTotal">0</b><span>总数</span></div>
        <div class="stat"><b id="statUnregistered">0</b><span>未注册</span></div>
        <div class="stat"><b id="statRegistered">0</b><span>已注册</span></div>
        <div class="stat"><b id="statReceived">0</b><span>已接码</span></div>
        <div class="stat"><b id="statFailed">0</b><span>失败</span></div>
        <div class="stat"><b id="statReserved">0</b><span>占用中</span></div>
      </section>
      <div class="top-actions">
        <button id="openAddEmail" class="primary" type="button">新增邮箱</button>
        <button id="refreshAll" type="button">刷新</button>
        <button id="syncSource" type="button">同步源文件</button>
        <button id="resetReservations" type="button">释放占用</button>
      </div>
    </header>

    <section class="section" aria-labelledby="listTitle">
      <div class="section-head">
        <h2 id="listTitle">邮箱列表</h2>
        <div class="bulk-actions" aria-label="批量操作">
          <span id="selectionCount">已选 0</span>
          <select id="bulkStatus" aria-label="批量更新状态">
            <option value="unregistered">未注册</option>
            <option value="registered">已注册</option>
            <option value="received">已接码</option>
            <option value="failed">失败</option>
          </select>
          <button id="updateSelected" type="button" disabled>批量更新</button>
          <button id="exportSelected" type="button" disabled>批量导出</button>
          <button id="deleteSelected" class="danger" type="button" disabled>批量删除</button>
        </div>
      </div>
      <div class="toolbar">
        <div class="filters" aria-label="邮箱状态筛选">
          <button class="filter active" type="button" data-status="unregistered">未注册</button>
          <button class="filter" type="button" data-status="registered">已注册</button>
          <button class="filter" type="button" data-status="received">已接码</button>
          <button class="filter" type="button" data-status="failed">失败</button>
          <button class="filter" type="button" data-status="all">全部</button>
        </div>
        <form id="searchForm" class="search">
          <input id="emailSearch" type="search" autocomplete="off" placeholder="邮箱或 client_id">
          <button class="primary" type="submit">搜索</button>
          <button id="clearSearch" type="button">清空</button>
        </form>
      </div>
      <div id="emailList" class="empty">加载中</div>
      <div id="emailPagination" class="pager"></div>
    </section>
  </main>

  <div id="addModal" class="modal-backdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="addModalTitle">
      <div class="modal-head">
        <h2 id="addModalTitle">新增邮箱</h2>
        <button id="closeAddModal" type="button" aria-label="关闭新增邮箱弹窗">关闭</button>
      </div>
      <div class="modal-body">
        <label>
          <span class="field-label">账号串</span>
          <textarea id="emailText" spellcheck="false" placeholder="email----password----client_id----refresh_token"></textarea>
        </label>
      </div>
      <div class="modal-actions">
        <button id="cancelAddEmail" type="button">取消</button>
        <button id="addEmails" class="primary" type="button">写入</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    const emailStatusLabels = {
      unregistered: '未注册',
      registered: '已注册',
      received: '已接码',
      failed: '失败',
      all: '全部',
    };

    const state = {
      status: 'unregistered',
      query: '',
      page: 1,
      pageSize: 20,
      stats: null,
      emails: null,
      selectedEmails: new Set(),
    };

    const $ = (id) => document.getElementById(id);
    let toastTimer = null;

    function toast(message) {
      const el = $('toast');
      el.textContent = message || '';
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
    }

    function fallbackCopyText(text) {
      const input = document.createElement('textarea');
      input.value = text;
      input.style.position = 'fixed';
      input.style.left = '-9999px';
      document.body.appendChild(input);
      input.focus();
      input.select();
      document.execCommand('copy');
      input.remove();
    }

    async function copyText(value, label = '内容') {
      const text = String(value || '').trim();
      if (!text) {
        toast('没有可复制的内容');
        return;
      }
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          fallbackCopyText(text);
        }
        toast(`${label}已复制`);
      } catch (err) {
        fallbackCopyText(text);
        toast(`${label}已复制`);
      }
    }

    async function api(path, options = {}) {
      const init = {
        method: options.method || 'GET',
        headers: { 'Content-Type': 'application/json' },
      };
      if (options.body !== undefined) {
        init.body = JSON.stringify(options.body);
      }
      const res = await fetch(path, init);
      const payload = await res.json().catch(() => ({ code: res.status, message: '接口返回不是 JSON' }));
      if (!res.ok || payload.code !== 0) {
        throw new Error(payload.message || '请求失败');
      }
      return payload.data;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (ch) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
      }[ch]));
    }

    function compact(value, head = 10, tail = 8) {
      const text = String(value || '');
      if (!text) return '-';
      if (text.length <= head + tail + 3) return text;
      return `${text.slice(0, head)}...${text.slice(-tail)}`;
    }

    function formatTime(ts) {
      if (!ts) return '-';
      const date = new Date(Number(ts) * 1000);
      if (Number.isNaN(date.getTime())) return '-';
      return date.toLocaleString('zh-CN', { hour12: false });
    }

    function copyButton(value, label, visibleText = value) {
      const text = String(value || '').trim();
      if (!text) return escapeHtml(visibleText || '-');
      return `<button class="copy" type="button" data-copy="${escapeHtml(text)}" data-copy-label="${escapeHtml(label)}">${escapeHtml(visibleText || text)}</button>`;
    }

    function statusOptions(current) {
      return ['unregistered', 'registered', 'received', 'failed'].map((value) => (
        `<option value="${value}" ${value === current ? 'selected' : ''}>${emailStatusLabels[value]}</option>`
      )).join('');
    }

    function statusMeta(item) {
      if (item.register_status === 'received') return `接码 ${formatTime(item.code_received_at)}`;
      if (item.register_status === 'registered') return `注册 ${formatTime(item.registered_at)}`;
      if (item.register_status === 'failed') return '失败';
      return item.reserved_at ? `占用 ${formatTime(item.reserved_at)}` : '未注册';
    }

    function setBusy(id, busy) {
      const el = $(id);
      if (el) el.disabled = Boolean(busy);
    }

    function openAddModal() {
      $('addModal').hidden = false;
      document.body.classList.add('modal-open');
      setTimeout(() => $('emailText')?.focus(), 0);
    }

    function closeAddModal() {
      $('addModal').hidden = true;
      document.body.classList.remove('modal-open');
    }

    async function loadStats() {
      const data = await api('/api/stats');
      state.stats = data;
      $('statTotal').textContent = data.emails_source_total ?? 0;
      $('statUnregistered').textContent = data.emails_unregistered ?? 0;
      $('statRegistered').textContent = data.emails_registered ?? 0;
      $('statReceived').textContent = data.emails_received_code ?? 0;
      $('statFailed').textContent = data.emails_failed ?? 0;
      $('statReserved').textContent = data.emails_reserved ?? 0;
    }

    async function loadEmails() {
      const params = new URLSearchParams({
        status: state.status,
        q: state.query,
        page: String(state.page),
        page_size: String(state.pageSize),
      });
      const data = await api(`/api/emails?${params.toString()}`);
      if (Number(data.page || 1) > Number(data.total_pages || 1)) {
        state.page = Number(data.total_pages || 1);
        return loadEmails();
      }
      state.emails = data;
      renderEmails();
    }

    async function refreshAll() {
      await Promise.all([loadStats(), loadEmails()]);
    }

    async function addEmails() {
      const text = $('emailText').value.trim();
      if (!text) {
        toast('请先填入邮箱');
        return;
      }
      setBusy('addEmails', true);
      try {
        const data = await api('/api/list', {
          method: 'POST',
          body: { kind: 'email', bucket: 'unregistered', text },
        });
        $('emailText').value = '';
        state.page = 1;
        toast(`已写入 ${Number(data.added || 0)} 条，跳过 ${Number(data.skipped || 0)} 条`);
        closeAddModal();
        await refreshAll();
      } finally {
        setBusy('addEmails', false);
      }
    }

    async function updateEmail(email, status) {
      if (!email || !status) return;
      const data = await api('/api/email-status', {
        method: 'PUT',
        body: { values: [email], status },
      });
      toast(`已更新 ${Number(data.updated || 0)} 条`);
      await refreshAll();
    }

    async function deleteEmail(email) {
      if (!email) return;
      if (!confirm(`确定删除邮箱 ${email}？`)) return;
      const data = await api('/api/emails', {
        method: 'DELETE',
        body: { values: [email] },
      });
      toast(`已删除 ${Number(data.removed || 0)} 条`);
      state.selectedEmails.delete(String(email || '').trim().toLowerCase());
      await refreshAll();
    }

    async function exportEmail(email) {
      if (!email) return;
      const data = await api('/api/emails/export', {
        method: 'POST',
        body: { values: [email] },
      });
      downloadText(data.filename || 'email-accounts.csv', data.text || '', data.mime || 'text/plain;charset=utf-8');
      toast(`已导出 ${Number(data.count || 0)} 条`);
    }

    function selectedEmailValues() {
      return Array.from(state.selectedEmails).filter(Boolean);
    }

    function currentPageEmailKeys() {
      return (state.emails?.items || [])
        .map((item) => String(item.email || '').trim().toLowerCase())
        .filter(Boolean);
    }

    function selectedExportableEmails() {
      return (state.emails?.items || [])
        .filter((item) => ['registered', 'received'].includes(item.register_status))
        .map((item) => String(item.email || '').trim().toLowerCase())
        .filter((email) => email && state.selectedEmails.has(email));
    }

    function updateBulkControls() {
      const selectedCount = state.selectedEmails.size;
      const exportCount = selectedExportableEmails().length;
      $('selectionCount').textContent = `已选 ${selectedCount}`;
      $('bulkStatus').disabled = selectedCount === 0;
      $('updateSelected').disabled = selectedCount === 0;
      $('updateSelected').textContent = selectedCount ? `批量更新 (${selectedCount})` : '批量更新';
      $('exportSelected').disabled = exportCount === 0;
      $('exportSelected').textContent = exportCount ? `批量导出 (${exportCount})` : '批量导出';
      $('deleteSelected').disabled = selectedCount === 0;
      $('deleteSelected').textContent = selectedCount ? `批量删除 (${selectedCount})` : '批量删除';

      const selectPage = $('selectPage');
      if (!selectPage) return;
      const pageEmails = currentPageEmailKeys();
      const selectedOnPage = pageEmails.filter((email) => state.selectedEmails.has(email)).length;
      selectPage.disabled = pageEmails.length === 0;
      selectPage.checked = pageEmails.length > 0 && selectedOnPage === pageEmails.length;
      selectPage.indeterminate = selectedOnPage > 0 && selectedOnPage < pageEmails.length;
    }

    function setCurrentPageSelection(checked) {
      currentPageEmailKeys().forEach((email) => {
        if (checked) {
          state.selectedEmails.add(email);
        } else {
          state.selectedEmails.delete(email);
        }
      });
      renderEmails();
    }

    async function exportSelectedEmails() {
      const values = selectedExportableEmails();
      if (!values.length) {
        toast('请选择已注册或已接码邮箱');
        return;
      }
      const data = await api('/api/emails/export', {
        method: 'POST',
        body: { values },
      });
      downloadText(data.filename || 'email-accounts.csv', data.text || '', data.mime || 'text/plain;charset=utf-8');
      toast(`已导出 ${Number(data.count || 0)} 条`);
      updateBulkControls();
    }

    async function updateSelectedEmailsStatus() {
      const values = selectedEmailValues();
      const status = $('bulkStatus').value || 'unregistered';
      if (!values.length) {
        toast('请先选择邮箱');
        return;
      }
      if (!confirm(`确定把选中的 ${values.length} 个邮箱改为${emailStatusLabels[status] || status}？`)) return;
      const data = await api('/api/email-status', {
        method: 'PUT',
        body: { values, status },
      });
      state.selectedEmails.clear();
      toast(`已更新 ${Number(data.updated || 0)} 条`);
      await refreshAll();
    }

    async function deleteSelectedEmails() {
      const values = selectedEmailValues();
      if (!values.length) {
        toast('请先选择邮箱');
        return;
      }
      if (!confirm(`确定删除选中的 ${values.length} 个邮箱？`)) return;
      const data = await api('/api/emails', {
        method: 'DELETE',
        body: { values },
      });
      values.forEach((email) => state.selectedEmails.delete(email));
      toast(`已删除 ${Number(data.removed || 0)} 条`);
      await refreshAll();
    }

    async function syncSource() {
      setBusy('syncSource', true);
      try {
        const data = await api('/api/gpt-login/mail-pool/sync', {
          method: 'POST',
          body: {},
        });
        const source = data.sourceSync || {};
        toast(`已同步：未注册 ${Number(source.emails_unregistered || 0)}，已注册 ${Number(source.emails_registered || 0)}，已接码 ${Number(source.emails_received || 0)}`);
        await refreshAll();
      } finally {
        setBusy('syncSource', false);
      }
    }

    async function resetReservations() {
      const count = Number(state.stats?.emails_reserved || 0);
      if (!count) {
        toast('当前没有占用中的邮箱');
        return;
      }
      if (!confirm(`确定释放 ${count} 个占用中的邮箱？`)) return;
      setBusy('resetReservations', true);
      try {
        await api('/api/gpt-login/mail-pool/reset', {
          method: 'POST',
          body: {},
        });
        toast(`已释放 ${count} 个占用`);
        await refreshAll();
      } finally {
        setBusy('resetReservations', false);
      }
    }

    function downloadText(filename, text, mime = 'text/plain;charset=utf-8') {
      const blob = new Blob([text], { type: mime });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function renderFilters() {
      document.querySelectorAll('[data-status]').forEach((button) => {
        button.classList.toggle('active', button.dataset.status === state.status);
      });
    }

    function renderPager(data) {
      const el = $('emailPagination');
      const page = Number(data.page || 1);
      const totalPages = Number(data.total_pages || 1);
      const total = Number(data.total ?? 0);
      const sizes = [10, 20, 50, 100];
      el.innerHTML = `
        <div>第 ${page} / ${totalPages} 页 · 共 ${total} 条</div>
        <div class="pager-actions">
          <select data-page-size aria-label="每页数量">
            ${sizes.map((size) => `<option value="${size}" ${size === state.pageSize ? 'selected' : ''}>${size} 条</option>`).join('')}
          </select>
          <button type="button" data-page="-1" ${page <= 1 ? 'disabled' : ''}>上一页</button>
          <button type="button" data-page="1" ${page >= totalPages ? 'disabled' : ''}>下一页</button>
        </div>
      `;
    }

    function renderEmails() {
      renderFilters();
      const list = $('emailList');
      const items = state.emails?.items || [];
      if (!items.length) {
        list.className = 'empty';
        list.innerHTML = state.query ? '没有匹配的邮箱' : '暂无邮箱记录';
        renderPager(state.emails || {});
        updateBulkControls();
        return;
      }

      list.className = 'table-wrap';
      list.innerHTML = `
        <table>
          <thead>
            <tr>
              <th class="select-col">
                <input id="selectPage" class="row-checkbox" type="checkbox" aria-label="选择本页邮箱">
              </th>
              <th>状态</th>
              <th>邮箱</th>
              <th>client_id</th>
              <th>refresh_token</th>
              <th>更新时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            ${items.map((item) => {
        const email = String(item.email || '').trim().toLowerCase();
        const status = item.register_status || 'unregistered';
        const canExport = ['registered', 'received'].includes(status);
        const isSelected = state.selectedEmails.has(email);
        return `
          <tr class="${isSelected ? 'is-selected' : ''}">
            <td class="select-col">
              <input
                class="row-checkbox"
                type="checkbox"
                data-select-email="${escapeHtml(email)}"
                aria-label="选择 ${escapeHtml(email)}"
                ${isSelected ? 'checked' : ''}
                ${email ? '' : 'disabled'}
              >
            </td>
            <td><span class="badge ${escapeHtml(status)}">${escapeHtml(emailStatusLabels[status] || status)}</span></td>
            <td class="email-cell">
              ${copyButton(email, '邮箱', email || '-')}
              <div class="meta">${escapeHtml(statusMeta(item))}</div>
            </td>
            <td class="token-cell">${copyButton(item.client_id || '', 'client_id', compact(item.client_id, 12, 8))}</td>
            <td class="token-cell">${copyButton(item.refresh_token || '', 'refresh_token', compact(item.refresh_token, 12, 10))}</td>
            <td class="time-cell">${formatTime(item.updated_at || item.created_at)}</td>
            <td class="action-cell">
              <div class="row-actions">
                <select class="status-edit" data-email-status="${escapeHtml(email)}">${statusOptions(status)}</select>
                <button type="button" data-email-update="${escapeHtml(email)}">更新</button>
                <button type="button" data-email-export="${escapeHtml(email)}" ${canExport ? '' : 'disabled'}>导出</button>
                <button class="danger" type="button" data-email-delete="${escapeHtml(email)}">删除</button>
              </div>
            </td>
          </tr>
        `;
      }).join('')}
          </tbody>
        </table>
      `;
      renderPager(state.emails || {});
      updateBulkControls();
    }

    function bindEvents() {
      $('openAddEmail').addEventListener('click', openAddModal);
      $('closeAddModal').addEventListener('click', closeAddModal);
      $('cancelAddEmail').addEventListener('click', closeAddModal);
      $('refreshAll').addEventListener('click', () => refreshAll().catch((err) => toast(err.message)));
      $('syncSource').addEventListener('click', () => syncSource().catch((err) => toast(err.message)));
      $('resetReservations').addEventListener('click', () => resetReservations().catch((err) => toast(err.message)));
      $('addEmails').addEventListener('click', () => addEmails().catch((err) => toast(err.message)));
      $('updateSelected').addEventListener('click', () => updateSelectedEmailsStatus().catch((err) => toast(err.message)));
      $('exportSelected').addEventListener('click', () => exportSelectedEmails().catch((err) => toast(err.message)));
      $('deleteSelected').addEventListener('click', () => deleteSelectedEmails().catch((err) => toast(err.message)));

      $('addModal').addEventListener('click', (event) => {
        if (event.target === $('addModal')) closeAddModal();
      });

      $('searchForm').addEventListener('submit', (event) => {
        event.preventDefault();
        state.query = $('emailSearch').value.trim();
        state.page = 1;
        state.selectedEmails.clear();
        loadEmails().catch((err) => toast(err.message));
      });

      $('clearSearch').addEventListener('click', () => {
        $('emailSearch').value = '';
        state.query = '';
        state.page = 1;
        state.selectedEmails.clear();
        loadEmails().catch((err) => toast(err.message));
      });

      document.querySelectorAll('[data-status]').forEach((button) => {
        button.addEventListener('click', () => {
          state.status = button.dataset.status || 'unregistered';
          state.page = 1;
          state.selectedEmails.clear();
          loadEmails().catch((err) => toast(err.message));
        });
      });

      document.body.addEventListener('click', (event) => {
        const copyEl = event.target.closest('[data-copy]');
        if (copyEl) {
          event.preventDefault();
          copyText(copyEl.dataset.copy || '', copyEl.dataset.copyLabel || '内容');
          return;
        }

        const updateButton = event.target.closest('[data-email-update]');
        if (updateButton) {
          const email = updateButton.dataset.emailUpdate || '';
          const row = updateButton.closest('tr');
          const select = row?.querySelector('[data-email-status]');
          updateButton.disabled = true;
          updateEmail(email, select?.value || 'unregistered').catch((err) => {
            toast(err.message);
          }).finally(() => {
            updateButton.disabled = false;
          });
          return;
        }

        const exportButton = event.target.closest('[data-email-export]');
        if (exportButton) {
          exportButton.disabled = true;
          exportEmail(exportButton.dataset.emailExport || '').catch((err) => {
            toast(err.message);
          }).finally(() => {
            exportButton.disabled = false;
          });
          return;
        }

        const deleteButton = event.target.closest('[data-email-delete]');
        if (deleteButton) {
          deleteButton.disabled = true;
          deleteEmail(deleteButton.dataset.emailDelete || '').catch((err) => {
            toast(err.message);
          }).finally(() => {
            deleteButton.disabled = false;
          });
        }
      });

      $('emailList').addEventListener('change', (event) => {
        const selectPage = event.target.closest('#selectPage');
        if (selectPage) {
          setCurrentPageSelection(selectPage.checked);
          return;
        }

        const input = event.target.closest('[data-select-email]');
        if (!input) return;
        const email = input.dataset.selectEmail || '';
        if (input.checked) {
          state.selectedEmails.add(email);
        } else {
          state.selectedEmails.delete(email);
        }
        renderEmails();
      });

      $('emailPagination').addEventListener('click', (event) => {
        const button = event.target.closest('[data-page]');
        if (!button) return;
        state.page = Math.max(1, state.page + Number(button.dataset.page || 0));
        state.selectedEmails.clear();
        loadEmails().catch((err) => toast(err.message));
      });

      $('emailPagination').addEventListener('change', (event) => {
        const select = event.target.closest('[data-page-size]');
        if (!select) return;
        state.pageSize = Number(select.value || 20);
        state.page = 1;
        state.selectedEmails.clear();
        loadEmails().catch((err) => toast(err.message));
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && !$('addModal').hidden) {
          closeAddModal();
        }
      });
    }

    async function init() {
      bindEvents();
      try {
        await refreshAll();
      } catch (err) {
        toast(err.message);
      }
    }

    init();
  </script>
</body>
</html>
