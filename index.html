<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex 自动接码</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef3f8;
      --panel: #ffffff;
      --panel-soft: #f7fafc;
      --line: #d7e0ea;
      --line-strong: #a8b5c6;
      --text: #111c2f;
      --muted: #64748b;
      --muted-strong: #41516a;
      --blue: #2563eb;
      --blue-hover: #1d4ed8;
      --blue-soft: #e7f0ff;
      --cyan: #0891b2;
      --green: #07835f;
      --green-soft: #e5f7ef;
      --amber: #a16207;
      --amber-soft: #fff4d8;
      --red: #c62828;
      --red-soft: #fff0f0;
      --dark: #101827;
      --shadow: 0 18px 42px rgba(30, 42, 62, 0.10);
      --shadow-soft: 0 1px 2px rgba(15, 23, 42, 0.06);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scrollbar-gutter: stable;
    }

    body {
      margin: 0;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #fff;
      color: var(--text);
      padding: 0 16px;
      cursor: pointer;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
      box-shadow: var(--shadow-soft);
      transition: 0.16s ease;
    }

    button:hover {
      border-color: #8796aa;
      background: var(--panel-soft);
      box-shadow: 0 8px 18px rgba(30, 42, 62, 0.10);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      box-shadow: none;
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.18);
      outline-offset: 2px;
    }

    .primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
      box-shadow: 0 12px 26px rgba(37, 99, 235, 0.22);
    }

    .primary:hover {
      border-color: var(--blue-hover);
      background: var(--blue-hover);
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--text);
      outline: none;
      box-shadow: var(--shadow-soft);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input,
    select {
      height: 42px;
      padding: 0 13px;
      font-size: 14px;
    }

    textarea {
      min-height: 132px;
      resize: vertical;
      padding: 12px 13px;
      line-height: 1.55;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14), var(--shadow-soft);
    }

    input::placeholder,
    textarea::placeholder {
      color: #8a98aa;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .page {
      min-height: 100vh;
      padding: 26px;
    }

    .shell {
      width: min(1480px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) minmax(420px, 760px);
      gap: 22px;
      align-items: end;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.1;
      font-weight: 850;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .config {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 148px 116px;
      gap: 10px;
      align-items: end;
    }

    .config > *,
    .resource-grid > *,
    .run-grid > *,
    .tasks-head > *,
    .stats > *,
    .metric > * {
      min-width: 0;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(420px, 0.9fr) minmax(520px, 1.1fr);
      gap: 18px;
      align-items: stretch;
    }

    .panel {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .ai-panel {
      display: grid;
      grid-template-rows: auto 1fr;
      background: var(--dark);
      color: #ecf5ff;
      position: relative;
      isolation: isolate;
    }

    .ai-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background:
        linear-gradient(90deg, rgba(37, 99, 235, 0.28), transparent 28%),
        linear-gradient(135deg, rgba(8, 145, 178, 0.18), transparent 40%);
    }

    .ai-panel::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #7dd3fc, #60a5fa, transparent);
      animation: scan 2.6s linear infinite;
    }

    @keyframes scan {
      0% { transform: translateX(-60%); opacity: 0.4; }
      50% { opacity: 1; }
      100% { transform: translateX(60%); opacity: 0.4; }
    }

    .ai-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      padding: 22px 22px 12px;
    }

    .eyebrow {
      color: #9fd5ff;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .ai-title {
      margin-top: 8px;
      font-size: 28px;
      line-height: 1.16;
      font-weight: 850;
    }

    .ai-hint {
      margin-top: 10px;
      max-width: 520px;
      color: #b7c7dc;
      font-size: 14px;
      line-height: 1.55;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 11px;
      border: 1px solid rgba(125, 211, 252, 0.45);
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.55);
      color: #dff6ff;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .ai-body {
      display: grid;
      gap: 16px;
      padding: 0 22px 22px;
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .step {
      border: 1px solid rgba(184, 205, 230, 0.24);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.06);
      padding: 10px;
      color: #cbd9ea;
      font-size: 12px;
      font-weight: 800;
    }

    .step b {
      display: block;
      margin-bottom: 5px;
      color: #ffffff;
      font-size: 18px;
      line-height: 1;
    }

    .step.active {
      border-color: rgba(125, 211, 252, 0.70);
      background: rgba(37, 99, 235, 0.24);
    }

    .run-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding-top: 2px;
    }

    .run-note {
      color: #aebed3;
      font-size: 13px;
      line-height: 1.5;
    }

    .run-grid .primary {
      min-width: 150px;
      min-height: 50px;
      font-size: 16px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      display: grid;
      gap: 4px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 15px 16px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .metric::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: var(--blue);
    }

    .metric:nth-child(2)::before {
      background: var(--green);
    }

    .metric:nth-child(3)::before {
      background: var(--amber);
    }

    .metric:nth-child(4)::before {
      background: var(--muted-strong);
    }

    .metric:nth-child(5)::before {
      background: var(--cyan);
    }

    .metric:nth-child(6)::before {
      background: var(--red);
    }

    .metric:nth-child(7)::before {
      background: var(--green);
    }

      .metric b {
        font-size: 30px;
        line-height: 1;
        font-weight: 850;
      }

    .metric span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .resource-panel {
      padding: 18px;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 800;
    }

    .resource-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .resource-action {
      display: flex;
      justify-content: flex-end;
      margin-top: 12px;
    }

    .source-note {
      margin: -4px 0 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .inventory-panel {
      display: grid;
      gap: 0;
    }

    .inventory-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff, #f9fbfd);
    }

    .inventory-head h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 800;
    }

    .inventory-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 0.8fr);
      gap: 18px;
      padding: 18px;
    }

    .inventory-section {
      min-width: 0;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .inventory-title {
      color: var(--text);
      font-size: 15px;
      font-weight: 850;
    }

    .segmented {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .segment {
      min-height: 34px;
      padding: 0 12px;
      font-size: 13px;
      box-shadow: none;
    }

    .segment.active {
      border-color: var(--blue);
      background: var(--blue-soft);
      color: var(--blue);
    }

    .resource-list {
      display: grid;
      gap: 10px;
      max-height: 430px;
      overflow: auto;
    }

    .resource-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow-soft);
    }

    .resource-main {
      min-width: 0;
      display: grid;
      gap: 5px;
    }

    .resource-name {
      color: var(--text);
      font-size: 14px;
      font-weight: 850;
      overflow-wrap: anywhere;
    }

    .resource-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .resource-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .small-button {
      min-height: 34px;
      padding: 0 11px;
      font-size: 12px;
      box-shadow: none;
    }

    .task-panel {
      display: grid;
      gap: 0;
    }

    .tasks-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff, #f9fbfd);
    }

    .tasks-head h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 800;
    }

    .task-list {
      display: grid;
      gap: 12px;
      max-height: min(58vh, 660px);
      overflow: auto;
      padding: 18px;
    }

    .task {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 15px;
      box-shadow: var(--shadow-soft);
    }

    .task-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .task-email {
      color: var(--text);
      font-size: 16px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .task-sub {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-soft);
      color: var(--muted-strong);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge.completed {
      border-color: #a5dec8;
      background: var(--green-soft);
      color: var(--green);
    }

    .badge.failed {
      border-color: #f1b4b4;
      background: var(--red-soft);
      color: var(--red);
    }

    .badge.running,
    .badge.waiting_email_otp,
    .badge.email_code_found,
    .badge.starting,
    .badge.queued {
      border-color: #ecc67d;
      background: var(--amber-soft);
      color: var(--amber);
    }

    .progress {
      height: 8px;
      margin: 13px 0 11px;
      border-radius: 999px;
      background: #e8eef5;
      overflow: hidden;
    }

    .progress span {
      display: block;
      height: 100%;
      width: var(--value, 0%);
      border-radius: inherit;
      background: linear-gradient(90deg, var(--blue), var(--cyan));
      transition: width 0.25s ease;
    }

    .task.completed .progress span {
      background: linear-gradient(90deg, #10b981, #059669);
    }

    .task.failed .progress span {
      background: linear-gradient(90deg, #ef4444, #c62828);
    }

    .task-message {
      color: var(--muted-strong);
      font-size: 13px;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .code-info {
      margin-top: 8px;
      color: var(--green);
      font-size: 13px;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .logs {
      margin-top: 11px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
      color: var(--muted-strong);
      font-size: 12px;
      line-height: 1.55;
    }

    .log-line {
      display: grid;
      grid-template-columns: 132px minmax(0, 1fr);
      gap: 10px;
      padding: 2px 0;
      border-bottom: 1px dashed #edf1f5;
    }

    .log-line:last-child {
      border-bottom: 0;
    }

    .log-time {
      color: #7c8da3;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .log-message {
      overflow-wrap: anywhere;
    }

    .empty {
      padding: 34px 18px;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      background: var(--panel-soft);
      color: var(--muted);
      text-align: center;
      font-size: 14px;
    }

    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      max-width: min(440px, calc(100vw - 36px));
      padding: 12px 14px;
      border-radius: var(--radius);
      background: #172033;
      color: #fff;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: 0.18s ease;
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1180px) {
      .topbar,
      .hero,
      .inventory-grid {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      .page {
        padding: 14px;
      }

      h1 {
        font-size: 26px;
      }

      .config,
      .resource-grid,
      .run-grid,
      .resource-row {
        grid-template-columns: 1fr;
      }

      .steps {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .ai-head {
        flex-direction: column;
      }

      .ai-title {
        font-size: 26px;
      }

      .status-pill {
        align-self: flex-start;
      }

      .tasks-head {
        align-items: stretch;
        flex-direction: column;
      }

      .task-top {
        flex-direction: column;
      }

      .log-line {
        grid-template-columns: 1fr;
        gap: 2px;
      }
    }

    @media (max-width: 480px) {
      .stats {
        grid-template-columns: 1fr;
      }

      .steps {
        grid-template-columns: 1fr;
      }
    }

    /* 2026 workstation refresh */

      --line: #dbe3ee;
      --line-strong: #b8c5d6;
      --blue: #2f6df6;
      --blue-hover: #1f56d8;
      --green: #0f9f78;
      --cyan: #0f8caf;
      --amber: #b7791f;
      --red: #d92d3b;
      --violet: #6d5dfc;
      --dark: #101827;
      --radius: 8px;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
      --shadow-soft: 0 1px 2px rgba(15, 23, 42, 0.06);
    }

        linear-gradient(180deg, #eef4fb 0, #f7f9fc 360px, #f4f7fb 100%);

    }

    label {

    }

    input,
    select,
    textarea {
      border-color: var(--line);
      border-radius: 10px;
      box-shadow: none;
    }

    input,
    select {
      height: 46px;
      font-weight: 700;
    }

    textarea {
      min-height: 120px;
      background: #fbfdff;
      font-size: 12px;
    }

    button {
      min-height: 44px;
      border-radius: 10px;
      box-shadow: none;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      border-color: var(--blue);
      background: var(--blue);
      box-shadow: 0 13px 24px rgba(47, 109, 246, 0.20);
    }

    .primary:hover {
      border-color: var(--blue-hover);
      background: var(--blue-hover);
    }

    .hero {
      grid-template-columns: minmax(500px, 1.08fr) minmax(420px, 0.92fr);
      align-items: stretch;
    }

    .panel {
      border-color: rgba(184, 197, 214, 0.78);
      border-radius: 14px;
      box-shadow: var(--shadow);
    }

      min-height: 360px;
      border-color: #1f3555;
      background:
        linear-gradient(135deg, rgba(47, 109, 246, 0.20), transparent 38%),
        linear-gradient(180deg, #111d31, #0d1525);
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.22);
    }

    .ai-panel::before {
      background:
        linear-gradient(90deg, rgba(15, 140, 175, 0.22), transparent 30%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 42px);
    }

    .ai-panel::after {
      display: none;
    }

    .ai-head {
      padding: 26px 28px 16px;
    }

    .eyebrow {
      color: #8bd3ff;
      font-size: 12px;
      letter-spacing: 0.06em;
    }

    .ai-title {
      max-width: 680px;
      font-size: clamp(34px, 4vw, 58px);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .ai-hint {
      max-width: 760px;
      color: #bdd0e7;
      font-size: 15px;
    }

    .status-pill {
      min-height: 34px;
      border-color: rgba(139, 211, 255, 0.42);
      background: rgba(255, 255, 255, 0.08);
      color: #e8f6ff;
    }

    .ai-body {
      gap: 18px;
      padding: 0 28px 28px;
    }

    .steps {
      gap: 10px;
    }

    .step {
      min-height: 78px;
      border-color: rgba(184, 205, 230, 0.20);
      background: rgba(255, 255, 255, 0.055);
      color: #c9d7e8;
      display: grid;
      align-content: center;
    }

    .step b {
      color: #88cfff;
      font-size: 20px;
    }

    .step.active {
      border-color: rgba(110, 184, 255, 0.85);
      background: rgba(47, 109, 246, 0.24);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .run-grid {
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      margin-top: auto;
    }

    .run-note {
      color: #b8c9de;
      font-size: 14px;
    }

    .run-grid .primary {
      min-width: 190px;
      min-height: 56px;
      border-radius: 12px;
      font-size: 16px;
    }

    .stats {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .metric {
      min-height: 104px;
      border-color: rgba(184, 197, 214, 0.78);
      border-radius: 14px;
      padding: 18px 18px 16px;
      box-shadow: var(--shadow-soft);
    }

    .metric:nth-child(7) {
      grid-column: 1 / -1;
    }

    .metric::before {
      width: 100%;
      height: 4px;
      inset: 0 0 auto;
    }

    .metric b {
      font-size: 38px;
      letter-spacing: -0.02em;
    }

    .metric span {
      color: #51657f;
      font-size: 13px;
    }

    .resource-panel {
      padding: 0;
    }

    .resource-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 20px 22px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #fff, #fbfdff);
    }

    .resource-head .section-title {
      margin: 0;
    }

    .resource-head .source-note {
      margin: 7px 0 0;
      font-size: 12px;
    }

    .resource-chip {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 0 11px;
      border: 1px solid #bee4d7;
      border-radius: 999px;
      background: #ecfbf6;
      color: var(--green);
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }

    .resource-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      padding: 22px 22px 0;
    }

    .resource-action {
      justify-content: flex-end;
      align-items: center;
      margin-top: 0;
      padding: 16px 22px 22px;
    }

    .resource-action::before {
      content: none;
    }

    .resource-action .primary {
      min-width: 132px;
    }

    .inventory-head,
    .tasks-head {
      padding: 20px 24px;
      background: linear-gradient(180deg, #fff, #fbfdff);
    }

    .inventory-head h2,
    .tasks-head h2,
    .section-title {
      font-size: 20px;
      letter-spacing: 0;
    }

    .inventory-grid {
      grid-template-columns: minmax(0, 1.35fr) minmax(320px, 0.65fr);
      gap: 22px;
      padding: 22px 24px 26px;
    }

    .inventory-section {
      gap: 14px;
    }

    .inventory-title {
      font-size: 16px;
    }

    .segmented {
      padding: 4px;
      gap: 4px;
      width: max-content;
      max-width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f3f6fa;
    }

    .segment {
      min-height: 34px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: #52657f;
      padding: 0 13px;
    }

    .segment:hover {
      background: rgba(255, 255, 255, 0.82);
      transform: none;
      box-shadow: none;
    }

    .segment.active {
      background: #ffffff;
      color: var(--blue);
      box-shadow: 0 7px 18px rgba(15, 23, 42, 0.08);
    }

    .resource-list {
      gap: 10px;
      max-height: 520px;
      padding-right: 4px;
      scrollbar-width: thin;
    }

    .resource-row {
      border-color: rgba(184, 197, 214, 0.72);
      border-radius: 12px;
      padding: 14px 16px;
      background: linear-gradient(180deg, #fff, #fbfdff);
      box-shadow: var(--shadow-soft);
    }

    .resource-row:hover {
      border-color: #9fb0c7;
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.07);
    }

    .resource-name {
      font-size: 15px;
    }

    .resource-meta {
      color: #62748d;
      font-size: 12px;
    }

    .small-button {
      min-height: 36px;
      border-radius: 9px;
    }

    .task-list {
      max-height: none;
      padding: 22px 24px 26px;
    }

    .task {
      border-radius: 12px;
      padding: 16px;
      background: linear-gradient(180deg, #fff, #fbfdff);
    }

    .empty {
      min-height: 112px;
      display: grid;
      place-items: center;
      border-color: #bfd0e3;
      border-radius: 12px;
      background: #f8fbff;
      color: #6d7f99;
      font-size: 15px;
    }

    .toast {
      border-radius: 12px;
      background: #0f172a;
    }

    @media (min-width: 1380px) {
      .stats {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .metric:nth-child(7) {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 1180px) {
      .topbar,
      .hero,
      .inventory-grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        position: static;
      }

      .stats {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      .config,
      .resource-grid,
      .run-grid,
      .resource-row {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .resource-action {
        display: grid;
        gap: 12px;
        justify-content: stretch;
      }

      .resource-action .primary {
        width: 100%;
      }

      .segmented {
        width: 100%;
      }

      .segment {
        flex: 1;
      }
    }

    @media (max-width: 520px) {
      .page {
        padding: 12px;
      }

      .stats,
      .steps {
        grid-template-columns: 1fr;
      }

      .ai-head,
      .ai-body,
      .inventory-head,
      .tasks-head,
      .inventory-grid,
      .task-list {
        padding-left: 16px;
        padding-right: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="shell">
      <header class="topbar">
        <div>
          <h1>Codex 自动接码</h1>
          <div class="subtitle">AI 自动编排邮箱、CDK、验证码与远端状态</div>
        </div>
        <div class="config">
          <label>Codex API
            <input id="baseUrl" autocomplete="off" placeholder="https://www.hansaes.icu/">
          </label>
          <label>模式
            <select id="apiMode">
              <option value="legacy">legacy</option>
              <option value="v1">v1</option>
              <option value="auto">auto</option>
            </select>
          </label>
          <button id="saveConfig" class="primary">保存</button>
        </div>
      </header>

      <div class="hero">
        <section class="panel ai-panel">
          <div class="ai-head">
            <div>
              <div class="eyebrow">AI 运行中枢</div>
              <div id="smartTitle" class="ai-title">正在读取状态</div>
              <div id="smartHint" class="ai-hint">系统会根据资源池和任务队列自动判断下一步动作。</div>
            </div>
            <div id="smartBadge" class="status-pill">扫描中</div>
          </div>
          <div class="ai-body">
            <div class="steps">
              <div id="stepResource" class="step"><b>01</b>资源校验</div>
              <div id="stepSubmit" class="step"><b>02</b>提交任务</div>
              <div id="stepOtp" class="step"><b>03</b>接收验证码</div>
              <div id="stepRemote" class="step"><b>04</b>远端确认</div>
            </div>
            <div class="run-grid">
              <div id="runNote" class="run-note">等待资源池状态同步。</div>
              <button id="startTask" class="primary">跑完整个资源池</button>
            </div>
          </div>
        </section>

        <section class="stats">
          <div class="metric"><b id="statEmailsAvailable">0</b><span>可用未注册</span></div>
          <div class="metric"><b id="statEmailsRegistered">0</b><span>已注册邮箱</span></div>
          <div class="metric"><b id="statEmailsReceived">0</b><span>已接码邮箱</span></div>
          <div class="metric"><b id="statEmailsUnsold">0</b><span>未售出接码</span></div>
          <div class="metric"><b id="statEmailsSold">0</b><span>已售出接码</span></div>
          <div class="metric"><b id="statCdksUnused">0</b><span>未使用 CDK</span></div>
          <div class="metric"><b id="statCdksUsed">0</b><span>已使用 CDK</span></div>
        </section>
      </div>

      <section class="panel resource-panel">
        <div class="resource-head">
          <div>
            <h2 class="section-title">资源写入</h2>
            <div class="source-note">SQLite 数据源 · codex-register/data/resources.sqlite3</div>
          </div>
          <div class="resource-chip">邮箱 + CDK</div>
        </div>
        <div class="resource-grid">
          <label>邮箱
            <textarea id="emailText" spellcheck="false" placeholder="一行一个邮箱账号：email----password----client_id----refresh_token"></textarea>
          </label>
          <label>CDK
            <textarea id="cdkText" spellcheck="false" placeholder="一行一个 CDK"></textarea>
          </label>
        </div>
        <div class="resource-action">
          <button id="addResources" class="primary">写入资源</button>
        </div>
      </section>

      <section class="panel inventory-panel">
        <div class="inventory-head">
          <h2>资源查看</h2>
          <button id="refreshInventory">刷新</button>
        </div>
        <div class="inventory-grid">
          <div class="inventory-section">
            <div class="inventory-title">邮箱</div>
            <div class="segmented" id="emailStatusTabs">
              <button class="segment active" data-email-status="unregistered">未注册</button>
              <button class="segment" data-email-status="registered">已注册</button>
              <button class="segment" data-email-status="received">已接码</button>
            </div>
            <div class="segmented" id="emailSaleTabs">
              <button class="segment active" data-email-sale="unsold">未卖出</button>
              <button class="segment" data-email-sale="sold">已卖出</button>
              <button class="segment" data-email-sale="all">全部</button>
            </div>
            <div id="emailList" class="resource-list"></div>
          </div>

          <div class="inventory-section">
            <div class="inventory-title">CDK</div>
            <div class="segmented" id="cdkBucketTabs">
              <button class="segment active" data-cdk-bucket="unused">未使用 CDK</button>
              <button class="segment" data-cdk-bucket="used">已使用 CDK</button>
            </div>
            <div id="cdkList" class="resource-list"></div>
          </div>
        </div>
      </section>

      <section class="panel task-panel">
        <div class="tasks-head">
          <h2>任务流</h2>
          <button id="refreshTasks">刷新</button>
        </div>
        <div id="taskList" class="task-list"></div>
      </section>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const state = {
      stats: null,
      tasks: [],
      emailStatus: 'unregistered',
      emailSale: 'unsold',
      cdkBucket: 'unused',
      emails: null,
      cdks: null,
      toastTimer: null,
    };

    const $ = (id) => document.getElementById(id);
    const activeStatuses = new Set(['queued', 'starting', 'waiting_email_otp', 'email_code_found', 'running']);
    const progressMap = {
      queued: 12,
      starting: 28,
      waiting_email_otp: 48,
      email_code_found: 72,
      running: 86,
      completed: 100,
      failed: 100,
      canceled: 100,
    };

    function toast(message) {
      const el = $('toast');
      el.textContent = message;
      el.classList.add('show');
      clearTimeout(state.toastTimer);
      state.toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
    }

    async function api(path, options = {}) {
      const init = {
        method: options.method || 'GET',
        headers: { 'Content-Type': 'application/json' },
      };
      if (options.body !== undefined) {
        init.body = JSON.stringify(options.body);
      }
      const res = await fetch(path, init);
      const payload = await res.json().catch(() => ({ code: res.status, message: '接口返回不是 JSON' }));
      if (!res.ok || payload.code !== 0) {
        throw new Error(payload.message || '请求失败');
      }
      return payload.data;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (ch) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
      }[ch]));
    }

    function formatTime(ts) {
      if (!ts) return '-';
      const date = new Date(Number(ts) * 1000);
      if (Number.isNaN(date.getTime())) return '-';
      return date.toLocaleString('zh-CN', { hour12: false });
    }

    function compact(value, head = 12, tail = 8) {
      const text = String(value || '-');
      if (text.length <= head + tail + 3) return text;
      return `${text.slice(0, head)}...${text.slice(-tail)}`;
    }

    async function loadConfig() {
      const config = await api('/api/config');
      $('baseUrl').value = config.codex_base_url || '';
      $('apiMode').value = config.api_mode || 'auto';
    }

    async function saveConfig() {
      const data = await api('/api/config', {
        method: 'PUT',
        body: {
          codex_base_url: $('baseUrl').value.trim(),
          api_mode: $('apiMode').value,
        },
      });
      $('baseUrl').value = data.codex_base_url;
      $('apiMode').value = data.api_mode;
      toast('连接设置已保存');
    }

    async function loadStats() {
      const data = await api('/api/stats');
      state.stats = data;
      $('statEmailsAvailable').textContent = data.emails_available ?? 0;
      $('statEmailsRegistered').textContent = data.emails_registered ?? data.emails_used ?? 0;
      $('statEmailsReceived').textContent = data.emails_received_code ?? 0;
      $('statEmailsUnsold').textContent = data.emails_unsold ?? 0;
      $('statEmailsSold').textContent = data.emails_sold ?? 0;
      $('statCdksUnused').textContent = data.cdks_available ?? data.cdks_unused;
      $('statCdksUsed').textContent = data.cdks_used;
      renderIntelligence();
    }

    async function addResources() {
      const emailText = $('emailText').value.trim();
      const cdkText = $('cdkText').value.trim();
      if (!emailText && !cdkText) {
        toast('请先填入邮箱或 CDK');
        return;
      }

      $('addResources').disabled = true;
      try {
        const results = [];
        if (emailText) {
          const emailResult = await api('/api/list', {
            method: 'POST',
            body: { kind: 'email', bucket: 'unregistered', text: emailText },
          });
          $('emailText').value = '';
          results.push(`邮箱 ${Number(emailResult.added || 0)} 条，跳过 ${Number(emailResult.skipped || 0)} 条`);
        }
        if (cdkText) {
          const cdkResult = await api('/api/list', {
            method: 'POST',
            body: { kind: 'cdk', bucket: 'unused', text: cdkText },
          });
          $('cdkText').value = '';
          results.push(`CDK ${Number(cdkResult.added || 0)} 条，跳过 ${Number(cdkResult.skipped || 0)} 条`);
        }
        toast(`已写入：${results.join('；')}`);
        await Promise.all([loadStats(), loadInventory()]);
      } finally {
        $('addResources').disabled = false;
      }
    }

    async function startTask() {
      $('startTask').disabled = true;
      try {
        const data = await api('/api/automation/start-all', {
          method: 'POST',
          body: {},
        });
        toast(`已创建 ${data.created} 个任务，最多并发 ${data.worker_max} 个`);
        await Promise.all([loadStats(), loadTasks(), loadInventory()]);
      } finally {
        renderIntelligence();
      }
    }

    async function loadTasks() {
      const data = await api('/api/tasks');
      state.tasks = Array.isArray(data) ? data : [];
      renderTasks();
      renderIntelligence();
    }

    async function loadEmails() {
      const params = new URLSearchParams({
        status: state.emailStatus,
        sale: state.emailSale,
      });
      state.emails = await api(`/api/emails?${params.toString()}`);
      renderEmails();
    }

    async function loadCdks() {
      const params = new URLSearchParams({
        kind: 'cdk',
        bucket: state.cdkBucket,
      });
      state.cdks = await api(`/api/list?${params.toString()}`);
      renderCdks();
    }

    async function loadInventory() {
      await Promise.all([loadEmails(), loadCdks()]);
    }

    function renderEmails() {
      updateSegments();
      const list = $('emailList');
      const items = state.emails?.items || [];
      if (!items.length) {
        list.innerHTML = '<div class="empty">暂无邮箱记录</div>';
        return;
      }

      list.innerHTML = items.map((item) => {
        const canUpdateSale = item.register_status === 'received';
        const soldLabel = canUpdateSale ? (item.is_sold ? '已卖出' : '未卖出') : '待接码';
        const nextSold = item.is_sold ? '0' : '1';
        const actionText = item.is_sold ? '改为未卖出' : '标记已卖出';
        const saleAction = canUpdateSale
          ? `<button class="small-button" data-email="${escapeHtml(item.email || '')}" data-sold="${nextSold}">${escapeHtml(actionText)}</button>`
          : '<span class="badge">未接码</span>';
        const codeText = item.has_received_code ? `已接码：${formatTime(item.code_received_at)}` : '未接码';
        const registerText = item.is_registered ? `已注册：${formatTime(item.registered_at)}` : '未注册';
        const cdkText = item.last_cdk ? `CDK：${compact(item.last_cdk, 16, 8)}` : 'CDK：-';
        return `
          <div class="resource-row">
            <div class="resource-main">
              <div class="resource-name">${escapeHtml(item.email || '-')}</div>
              <div class="resource-meta">${escapeHtml(registerText)} · ${escapeHtml(codeText)} · ${escapeHtml(soldLabel)}</div>
              <div class="resource-meta">${escapeHtml(cdkText)}</div>
              <div class="resource-meta">${escapeHtml(item.preview || '')}</div>
            </div>
            <div class="resource-actions">
              ${saleAction}
            </div>
          </div>
        `;
      }).join('');
    }

    function renderCdks() {
      updateSegments();
      const list = $('cdkList');
      const items = state.cdks?.items || [];
      if (!items.length) {
        list.innerHTML = '<div class="empty">暂无 CDK</div>';
        return;
      }

      list.innerHTML = items.map((item) => `
        <div class="resource-row">
          <div class="resource-main">
            <div class="resource-name">${escapeHtml(compact(item.label || item.value, 20, 12))}</div>
            <div class="resource-meta">${escapeHtml(item.preview || '')}</div>
          </div>
          <span class="badge">${state.cdkBucket === 'used' ? '已使用' : '未使用'}</span>
        </div>
      `).join('');
    }

    function updateSegments() {
      document.querySelectorAll('[data-email-status]').forEach((button) => {
        button.classList.toggle('active', button.dataset.emailStatus === state.emailStatus);
      });
      document.querySelectorAll('[data-email-sale]').forEach((button) => {
        button.classList.toggle('active', button.dataset.emailSale === state.emailSale);
      });
      document.querySelectorAll('[data-cdk-bucket]').forEach((button) => {
        button.classList.toggle('active', button.dataset.cdkBucket === state.cdkBucket);
      });
    }

    async function updateEmailSold(email, isSold) {
      await api('/api/email-sale', {
        method: 'PUT',
        body: { values: [email], is_sold: isSold },
      });
      toast(isSold ? '已标记为已卖出' : '已改为未卖出');
      await Promise.all([loadStats(), loadEmails()]);
    }

    function renderIntelligence() {
      const stats = state.stats || {};
      const tasks = state.tasks || [];
      const active = tasks.find((task) => activeStatuses.has(task.status));
      const latest = tasks[0];
      const availableEmails = Number(stats.emails_registered_available ?? stats.emails_registered ?? 0);
      const availableCdks = Number(stats.cdks_available ?? stats.cdks_unused ?? 0);
      const hasEmail = availableEmails > 0;
      const hasCdk = availableCdks > 0;
      const workerText = stats.worker_max ? `线程池 ${stats.worker_pending || 0}/${stats.worker_max}` : '线程池就绪';

      clearStepState();

      if (active) {
        $('smartBadge').textContent = '监控中';
        $('smartTitle').textContent = statusTitle(active.status);
        $('smartHint').textContent = active.message || '任务正在推进，系统会自动轮询验证码和远端状态。';
        $('runNote').textContent = hasEmail && hasCdk
          ? `仍可继续调度 ${Math.min(availableEmails, availableCdks)} 组资源，${workerText}。`
          : `资源已全部进入队列或已耗尽，${workerText}。`;
        $('startTask').disabled = !(hasEmail && hasCdk);
        markSteps(active.status);
        return;
      }

      if (!hasEmail || !hasCdk) {
        $('smartBadge').textContent = '等待资源';
        $('smartTitle').textContent = '资源不足';
        $('smartHint').textContent = !hasEmail && !hasCdk
          ? '需要补充已注册邮箱和未使用 CDK 后才能开始。'
          : (!hasEmail ? '已注册邮箱已用尽。' : '未使用 CDK 已用尽，请写入新的 CDK。');
        $('runNote').textContent = '资源池补齐后，系统会自动切换为可执行状态。';
        $('startTask').disabled = true;
        $('stepResource').classList.add('active');
        return;
      }

      $('smartBadge').textContent = '就绪';
      $('smartTitle').textContent = latest?.status === 'completed' ? '上一轮已完成' : '可以开始';
      $('smartHint').textContent = latest?.message || '已注册邮箱与 CDK 已就绪，可以一次性跑完整个资源池。';
      $('runNote').textContent = `本轮可创建 ${Math.min(availableEmails, availableCdks)} 个任务；${workerText}。`;
      $('startTask').disabled = false;
      $('stepResource').classList.add('active');
    }

    function clearStepState() {
      ['stepResource', 'stepSubmit', 'stepOtp', 'stepRemote'].forEach((id) => {
        $(id).classList.remove('active');
      });
    }

    function markSteps(status) {
      $('stepResource').classList.add('active');
      if (['starting', 'waiting_email_otp', 'email_code_found', 'running', 'completed', 'failed'].includes(status)) {
        $('stepSubmit').classList.add('active');
      }
      if (['waiting_email_otp', 'email_code_found', 'running', 'completed', 'failed'].includes(status)) {
        $('stepOtp').classList.add('active');
      }
      if (['running', 'completed', 'failed'].includes(status)) {
        $('stepRemote').classList.add('active');
      }
    }

    function statusTitle(status) {
      return ({
        queued: '任务排队中',
        starting: '正在提交',
        waiting_email_otp: '等待验证码',
        email_code_found: '验证码已捕获',
        running: '远端处理中',
      })[status] || '任务运行中';
    }

    function renderTasks() {
      const list = $('taskList');
      const tasks = state.tasks.slice(0, 8);
      if (!tasks.length) {
        list.innerHTML = '<div class="empty">暂无任务</div>';
        return;
      }

      list.innerHTML = tasks.map((task) => {
        const logs = (task.logs || []).slice(-4).reverse().map((log) => (
          `<div class="log-line"><span class="log-time">${escapeHtml(log.time)}</span><span class="log-message">${escapeHtml(log.message)}</span></div>`
        )).join('');
        const status = task.status || '-';
        const progress = progressMap[status] ?? 20;
        const codeInfo = task.email_code
          ? `<div class="code-info">验证码 ${escapeHtml(task.email_code)} · ${escapeHtml(task.code_source || '-')}<br>${escapeHtml(task.code_freshness || '')}</div>`
          : '';
        return `
          <article class="task ${escapeHtml(status)}">
            <div class="task-top">
              <div>
                <div class="task-email">${escapeHtml(task.email || '-')}</div>
                <div class="task-sub">CDK：${escapeHtml(compact(task.cdk, 18, 10))}</div>
              </div>
              <span class="badge ${escapeHtml(status)}">${escapeHtml(status)}</span>
            </div>
            <div class="progress" aria-hidden="true"><span style="--value:${progress}%"></span></div>
            <div class="task-message">${escapeHtml(task.message || '-')}</div>
            ${codeInfo}
            <div class="task-sub">创建：${formatTime(task.created_at)} · 更新：${formatTime(task.updated_at)}</div>
            <div class="logs">${logs || '<span class="task-sub">暂无日志</span>'}</div>
          </article>
        `;
      }).join('');
    }

    function bindEvents() {
      $('saveConfig').addEventListener('click', () => saveConfig().catch((err) => toast(err.message)));
      $('addResources').addEventListener('click', () => addResources().catch((err) => toast(err.message)));
      $('startTask').addEventListener('click', () => startTask().catch((err) => toast(err.message)));
      $('refreshTasks').addEventListener('click', () => Promise.all([loadStats(), loadTasks(), loadInventory()]).catch((err) => toast(err.message)));
      $('refreshInventory').addEventListener('click', () => Promise.all([loadStats(), loadInventory()]).catch((err) => toast(err.message)));
      document.querySelectorAll('[data-email-status]').forEach((button) => {
        button.addEventListener('click', () => {
          state.emailStatus = button.dataset.emailStatus || 'registered';
          loadEmails().catch((err) => toast(err.message));
        });
      });
      document.querySelectorAll('[data-email-sale]').forEach((button) => {
        button.addEventListener('click', () => {
          state.emailSale = button.dataset.emailSale || 'unsold';
          loadEmails().catch((err) => toast(err.message));
        });
      });
      document.querySelectorAll('[data-cdk-bucket]').forEach((button) => {
        button.addEventListener('click', () => {
          state.cdkBucket = button.dataset.cdkBucket || 'unused';
          loadCdks().catch((err) => toast(err.message));
        });
      });
      $('emailList').addEventListener('click', (event) => {
        const button = event.target.closest('[data-email][data-sold]');
        if (!button) return;
        const email = button.dataset.email || '';
        const isSold = button.dataset.sold === '1';
        button.disabled = true;
        updateEmailSold(email, isSold).catch((err) => {
          button.disabled = false;
          toast(err.message);
        });
      });
    }

    async function boot() {
      bindEvents();
      await Promise.all([loadConfig(), loadStats(), loadTasks(), loadInventory()]);
      setInterval(() => {
        loadStats().catch(() => {});
        loadTasks().catch(() => {});
        loadInventory().catch(() => {});
      }, 5000);
    }

    boot().catch((err) => toast(err.message));
  </script>
</body>
</html>
