<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex 本地资源管理台</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --surface-strong: #edf3fa;
      --line: #dce4ee;
      --line-strong: #bdc8d8;
      --text: #142033;
      --muted: #66758c;
      --faint: #94a3b8;
      --blue: #2563eb;
      --blue-hover: #1d4ed8;
      --blue-soft: #eaf2ff;
      --green: #079365;
      --green-soft: #e7f8ef;
      --red: #d23838;
      --red-soft: #fff1f2;
      --amber: #b7790b;
      --amber-soft: #fff6dc;
      --shadow: 0 18px 42px rgba(20, 32, 51, 0.08);
      --shadow-soft: 0 1px 2px rgba(15, 23, 42, 0.06);
      --radius: 8px;
      --sidebar: 224px;
      --detail: 340px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 38px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      padding: 0 13px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 750;
      line-height: 1;
      white-space: nowrap;
      box-shadow: var(--shadow-soft);
      transition: border-color 0.16s ease, background 0.16s ease, color 0.16s ease, box-shadow 0.16s ease;
    }

    button:hover {
      border-color: #8f9db1;
      background: var(--surface-soft);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      box-shadow: none;
    }

    .primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.22);
    }

    .primary:hover {
      border-color: var(--blue-hover);
      background: var(--blue-hover);
    }

    .danger-button {
      border-color: #f2b6bd;
      background: #fff7f7;
      color: var(--red);
    }

    .danger-button:hover {
      border-color: #e7828d;
      background: #fff0f1;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      outline: none;
      box-shadow: var(--shadow-soft);
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(37, 99, 235, 0.65);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    input,
    select {
      height: 38px;
      padding: 0 11px;
      font-size: 13px;
    }

    textarea {
      min-height: 112px;
      resize: vertical;
      padding: 12px;
      line-height: 1.55;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      line-height: 1.15;
    }

    h1 {
      font-size: 25px;
      font-weight: 850;
    }

    h2 {
      font-size: 18px;
      font-weight: 850;
    }

    h3 {
      font-size: 15px;
      font-weight: 850;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar) minmax(0, 1fr) var(--detail);
      background: var(--bg);
    }

    .sidebar {
      min-width: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--line);
      background: var(--surface);
      padding: 24px 12px 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 10px 22px;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border: 1px solid #bad0ff;
      border-radius: 8px;
      background: var(--blue-soft);
      color: var(--blue);
      font-size: 13px;
      font-weight: 900;
    }

    .brand strong {
      display: block;
      font-size: 16px;
      font-weight: 850;
    }

    .brand span,
    .subtitle,
    .panel-subtitle,
    .resource-meta,
    .small-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .sidebar-nav {
      display: grid;
      gap: 6px;
    }

    .nav-item {
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      min-height: 44px;
      border-color: transparent;
      background: transparent;
      box-shadow: none;
      color: #40506a;
      padding: 0 12px;
      text-decoration: none;
    }

    .nav-item:hover,
    .nav-item.active {
      border-color: transparent;
      background: var(--blue-soft);
      color: var(--blue);
      box-shadow: none;
    }

    .nav-icon,
    .metric-icon,
    .button-icon {
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .nav-icon {
      width: 24px;
      height: 24px;
      border: 1px solid currentColor;
      border-radius: 7px;
      font-size: 11px;
      font-weight: 900;
      opacity: 0.82;
    }

    .sidebar-spacer {
      flex: 1;
    }

    .sidebar-footer {
      display: grid;
      gap: 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .user-chip {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      border-top: 1px solid var(--line);
      padding: 14px 8px 0;
    }

    .avatar {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #dbe3ee;
      color: #536275;
      font-weight: 900;
    }

    .user-chip b {
      display: block;
      color: var(--text);
      font-size: 13px;
    }

    .shell {
      min-width: 0;
      display: grid;
      gap: 14px;
      align-content: start;
      padding: 22px 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .topbar-actions,
    .tabs,
    .segmented,
    .actions,
    .selection-actions,
    .pager-actions,
    .resource-actions {
      display: flex;
      gap: 7px;
      align-items: center;
      flex-wrap: wrap;
    }

    .button-icon {
      width: 16px;
      height: 16px;
    }

    .button-icon svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .metric {
      min-width: 0;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 15px;
      cursor: pointer;
      box-shadow: var(--shadow-soft);
    }

    .metric.active {
      border-color: rgba(37, 99, 235, 0.45);
      background: #fbfdff;
    }

    .metric-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: var(--surface-soft);
      font-size: 18px;
      font-weight: 850;
    }

    .metric.available .metric-icon,
    .badge.unregistered {
      border-color: #abe3c5;
      background: var(--green-soft);
      color: var(--green);
    }

    .metric.registered .metric-icon,
    .badge.registered {
      border-color: #bcd2ff;
      background: var(--blue-soft);
      color: var(--blue);
    }

    .metric.received .metric-icon,
    .badge.received,
    .badge.reserved {
      border-color: #ecd17f;
      background: var(--amber-soft);
      color: var(--amber);
    }

    .metric.failed .metric-icon,
    .badge.failed {
      border-color: #f2b6bd;
      background: var(--red-soft);
      color: var(--red);
    }

    .metric b {
      display: block;
      font-size: 25px;
      line-height: 1;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
      margin-top: 4px;
    }

    .panel,
    .workspace-card {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .panel-head,
    .panel-body,
    .workspace-head,
    .workspace-body {
      padding: 15px;
    }

    .panel-head,
    .workspace-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      background: var(--surface-soft);
    }

    .write-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: end;
    }

    .tab,
    .segment,
    .small-button {
      min-height: 32px;
      padding: 0 9px;
      font-size: 12px;
      box-shadow: none;
    }

    .tab {
      border-color: transparent;
      background: transparent;
    }

    .tab.active,
    .segment.active {
      border-color: rgba(37, 99, 235, 0.45);
      background: var(--blue-soft);
      color: var(--blue);
    }

    .workspace {
      display: none;
    }

    .workspace.active {
      display: grid;
      gap: 12px;
    }

    .filters {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
    }

    .filter-stack {
      display: grid;
      gap: 10px;
    }

    .search-box {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto auto;
      gap: 8px;
      align-items: center;
    }

    .select-all {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
      white-space: nowrap;
    }

    .select-all input,
    .row-checkbox {
      width: 16px;
      height: 16px;
      box-shadow: none;
    }

    .selection-actions {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
      padding: 9px;
    }

    .selection-actions select {
      width: 150px;
    }

    .resource-actions select {
      width: 90px;
    }

    .pager-actions select {
      width: 108px;
    }

    .resource-list {
      min-width: 0;
    }

    .table-wrap {
      max-height: 470px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .data-table {
      width: 100%;
      min-width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13px;
      table-layout: fixed;
    }

    .data-table th,
    .data-table td {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      text-align: left;
      vertical-align: middle;
      overflow-wrap: anywhere;
      white-space: normal;
    }

    .data-table th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: var(--surface-soft);
      color: #475569;
      font-size: 12px;
      font-weight: 850;
    }

    .data-table tr:last-child td {
      border-bottom: 0;
    }

    .data-table tbody tr:hover {
      background: #fbfdff;
    }

    .data-table .resource-row.is-selected,
    .data-table .resource-row.is-active {
      background: #f4f8ff;
    }

    .select-col {
      width: 42px;
    }

    .status-col {
      width: 86px;
    }

    .action-col {
      width: 154px;
    }

    .mono,
    .token-cell {
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
    }

    .cell-main {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .resource-name {
      color: var(--text);
      font-size: 13px;
      font-weight: 850;
      overflow-wrap: anywhere;
    }

    .copy-button {
      display: inline;
      min-height: 0;
      border: 0;
      border-radius: 4px;
      background: transparent;
      color: inherit;
      padding: 0;
      box-shadow: none;
      font: inherit;
      font-weight: inherit;
      line-height: inherit;
      text-align: left;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .copy-button:hover {
      color: var(--blue);
      text-decoration: underline;
      background: transparent;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }

    .badge.completed {
      border-color: #abe3c5;
      background: var(--green-soft);
      color: var(--green);
    }

    .badge.summary {
      border-color: var(--line);
      background: var(--surface-soft);
      color: var(--muted);
    }

    .pager {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: #60738c;
      font-size: 13px;
      font-weight: 750;
    }

    .mail-pool-summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .mail-pool-stat {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
      padding: 10px;
    }

    .mail-pool-stat b {
      display: block;
      font-size: 20px;
      line-height: 1;
    }

    .mail-pool-stat span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .empty {
      min-height: 110px;
      display: grid;
      place-items: center;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      color: var(--muted);
      background: var(--surface-soft);
      font-weight: 750;
    }

    .detail-pane {
      min-width: 0;
      min-height: 100vh;
      border-left: 1px solid var(--line);
      background: var(--surface);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .detail-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding: 24px 22px;
    }

    .detail-close {
      width: 34px;
      min-height: 34px;
      padding: 0;
      border-color: transparent;
      background: transparent;
      box-shadow: none;
      color: #475569;
    }

    .detail-content {
      min-width: 0;
      display: grid;
      gap: 20px;
      align-content: start;
      padding: 20px 22px;
    }

    .detail-section {
      display: grid;
      gap: 14px;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 90px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
      font-size: 13px;
    }

    .detail-label {
      color: var(--muted);
    }

    .detail-value {
      min-width: 0;
      color: var(--text);
      overflow-wrap: anywhere;
    }

    .token-preview {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
      padding: 10px;
      color: #334155;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.6;
      overflow-wrap: anywhere;
    }

    .detail-actions {
      display: grid;
      gap: 12px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      margin: 0 -22px;
      padding: 20px 22px;
    }

    .detail-actions button {
      width: 100%;
    }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 20;
      max-width: min(420px, calc(100vw - 32px));
      border-radius: var(--radius);
      background: #101827;
      color: #fff;
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 750;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: 0.18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1260px) {
      .page {
        grid-template-columns: var(--sidebar) minmax(0, 1fr);
      }

      .detail-pane {
        grid-column: 2;
        min-height: auto;
        border-top: 1px solid var(--line);
        border-left: 0;
      }
    }

    @media (max-width: 980px) {
      .page {
        grid-template-columns: 1fr;
      }

      .sidebar {
        min-height: auto;
        padding: 16px;
      }

      .sidebar-nav {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .sidebar-footer {
        display: none;
      }

      .shell,
      .detail-pane {
        grid-column: auto;
      }

      .stats,
      .mail-pool-summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .filters,
      .write-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .shell {
        padding: 14px;
      }

      .topbar,
      .panel-head,
      .workspace-head,
      .pager {
        align-items: stretch;
        flex-direction: column;
      }

      .sidebar-nav,
      .stats {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 22px;
      }

      .search-box {
        grid-template-columns: 1fr;
      }

      .detail-row {
        grid-template-columns: 1fr;
        gap: 4px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <aside class="sidebar" aria-label="主导航">
      <div class="brand">
        <div class="brand-mark">CR</div>
        <div>
          <strong>Codex Register</strong>
          <span>本地资源</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" type="button" data-workspace-tab="emails">
          <span class="nav-icon" aria-hidden="true">@</span>
          <span>邮箱资源</span>
        </button>
        <button class="nav-item" type="button" data-workspace-tab="mail-pool">
          <span class="nav-icon" aria-hidden="true">GP</span>
          <span>GPT 登录池</span>
        </button>
        <button class="nav-item" type="button" data-workspace-tab="credentials">
          <span class="nav-icon" aria-hidden="true">RT</span>
          <span>Codex 凭据</span>
        </button>
        <a class="nav-item" href="#emailImport">
          <span class="nav-icon" aria-hidden="true">+</span>
          <span>邮箱写入</span>
        </a>
      </nav>

      <div class="sidebar-spacer"></div>
      <div class="sidebar-footer">
        <div class="user-chip">
          <div class="avatar">A</div>
          <div>
            <b>admin</b>
            <span>本地管理员</span>
          </div>
        </div>
      </div>
    </aside>

    <main class="shell">
      <header class="topbar">
        <div>
          <h1>本地资源管理台</h1>
          <div class="subtitle">管理邮箱资源、登录池占用与 Codex 凭据</div>
        </div>
        <div class="topbar-actions">
          <button id="syncMailPool" class="primary" type="button">
            <span class="button-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M4 6h16v12H4z"></path><path d="m4 7 8 6 8-6"></path></svg>
            </span>
            同步邮箱池
          </button>
          <button id="refreshAll" type="button">
            <span class="button-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 0 1-15 6.7"></path><path d="M3 12a9 9 0 0 1 15-6.7"></path><path d="M18 3v5h-5"></path><path d="M6 21v-5h5"></path></svg>
            </span>
            刷新全部
          </button>
        </div>
      </header>

      <section class="stats" aria-label="资源统计">
        <div class="metric available" role="button" tabindex="0" data-open-email data-email-status="unregistered">
          <span class="metric-icon" aria-hidden="true">@</span>
          <div><b id="statEmailsAvailable">0</b><span>可用未注册</span></div>
        </div>
        <div class="metric registered" role="button" tabindex="0" data-open-email data-email-status="registered">
          <span class="metric-icon" aria-hidden="true">✓</span>
          <div><b id="statEmailsRegistered">0</b><span>已注册邮箱</span></div>
        </div>
        <div class="metric received" role="button" tabindex="0" data-open-email data-email-status="received">
          <span class="metric-icon" aria-hidden="true">#</span>
          <div><b id="statEmailsReceived">0</b><span>已接码邮箱</span></div>
        </div>
        <div class="metric failed" role="button" tabindex="0" data-open-email data-email-status="failed">
          <span class="metric-icon" aria-hidden="true">!</span>
          <div><b id="statEmailsFailed">0</b><span>失败邮箱</span></div>
        </div>
      </section>

      <section class="workspace-card">
        <div class="workspace-head">
          <div class="tabs" role="tablist" aria-label="资源类型">
            <button class="tab active" type="button" data-workspace-tab="emails">邮箱资源</button>
            <button class="tab" type="button" data-workspace-tab="mail-pool">GPT 登录池</button>
            <button class="tab" type="button" data-workspace-tab="credentials">Codex 凭据</button>
          </div>
          <button id="refreshWorkspace" type="button">刷新当前</button>
        </div>

        <div class="workspace-body">
          <div id="emailsWorkspace" class="workspace active" data-workspace="emails">
            <div class="filters">
              <div class="filter-stack">
                <div>
                  <h2>邮箱资源</h2>
                  <div class="panel-subtitle">按状态筛选、批量更新、导出账号串</div>
                </div>
                <div class="segmented" id="emailStatusTabs">
                  <button class="segment active" data-email-status="unregistered">未注册</button>
                  <button class="segment" data-email-status="registered">已注册</button>
                  <button class="segment" data-email-status="received">已接码</button>
                  <button class="segment" data-email-status="failed">失败</button>
                </div>
              </div>
              <div class="actions">
                <form id="emailSearchForm" class="search-box">
                  <input id="emailSearch" type="search" autocomplete="off" placeholder="搜索邮箱或 client_id">
                  <button class="small-button" type="submit">搜索</button>
                  <button id="clearEmailSearch" class="small-button" type="button">清空</button>
                </form>
              </div>
            </div>

            <div class="selection-actions">
              <label class="select-all" for="selectEmailsPage">
                <input id="selectEmailsPage" type="checkbox">
                <span>全选本页</span>
              </label>
              <span id="emailSelectionCount" class="small-note">已选 0</span>
              <select id="bulkEmailStatus" aria-label="批量邮箱状态">
                <option value="registered">改已注册</option>
                <option value="received">改已接码</option>
                <option value="unregistered">改未注册</option>
                <option value="failed">改失败</option>
              </select>
              <button id="updateSelectedEmailStatus" class="small-button" type="button" disabled>更新状态</button>
              <button id="exportEmails" class="primary" type="button" disabled>导出账号串</button>
              <button id="deleteSelectedEmails" class="small-button danger-button" type="button" disabled>删除选中</button>
            </div>

            <div id="emailList" class="resource-list"></div>
            <div id="emailPagination" class="pager"></div>
          </div>

            <div id="mailPoolWorkspace" class="workspace" data-workspace="mail-pool">
            <div class="filters">
              <div class="filter-stack">
                <div>
                  <h2>GPT 登录池</h2>
                  <div class="panel-subtitle">查看未注册、已注册、已接码与占用情况</div>
                </div>
                <div class="segmented" id="mailPoolStatusTabs">
                  <button class="segment active" data-mail-pool-status="all">全部</button>
                  <button class="segment" data-mail-pool-status="unregistered">未注册</button>
                  <button class="segment" data-mail-pool-status="registered">已注册</button>
                  <button class="segment" data-mail-pool-status="received">已接码</button>
                  <button class="segment" data-mail-pool-status="failed">失败</button>
                </div>
                <div id="mailPoolSummary" class="mail-pool-summary"></div>
              </div>
              <div class="actions">
                <form id="mailPoolSearchForm" class="search-box">
                  <input id="mailPoolSearch" type="search" autocomplete="off" placeholder="搜索邮箱">
                  <button class="small-button" type="submit">搜索</button>
                  <button id="clearMailPoolSearch" class="small-button" type="button">清空</button>
                </form>
                <button id="resetMailPool" class="small-button danger-button" type="button">释放占用</button>
              </div>
            </div>
            <div id="mailPoolList" class="resource-list"></div>
          </div>

          <div id="credentialsWorkspace" class="workspace" data-workspace="credentials">
            <div class="filters">
              <div>
                <h2>Codex 凭据</h2>
                <div class="panel-subtitle">完整 token 仅在点击复制或下载时读取</div>
              </div>
              <div class="actions">
                <form id="credentialSearchForm" class="search-box">
                  <input id="credentialSearch" type="search" autocomplete="off" placeholder="搜索邮箱、账号或来源">
                  <button class="small-button" type="submit">搜索</button>
                  <button id="clearCredentialSearch" class="small-button" type="button">清空</button>
                </form>
              </div>
            </div>
            <div id="credentialList" class="resource-list"></div>
          </div>
        </div>
      </section>

      <section class="panel" id="emailImport">
        <div class="panel-head">
          <div>
            <h2>邮箱写入</h2>
            <div class="panel-subtitle">SQLite 数据源 · codex-register/data/resources.sqlite3</div>
          </div>
        </div>
        <div class="panel-body">
          <div class="write-grid">
            <label>
              <span class="small-note">邮箱格式：email----password----client_id----refresh_token</span>
              <textarea id="emailText" spellcheck="false" placeholder="一行一个邮箱账号"></textarea>
            </label>
            <button id="addEmails" class="primary" type="button">写入邮箱</button>
          </div>
        </div>
      </section>
    </main>

    <aside class="detail-pane" aria-label="Codex 凭据详情">
      <div class="detail-head">
        <h2>Codex 凭据详情</h2>
        <button class="detail-close" type="button" data-workspace-tab="credentials" aria-label="查看 Codex 凭据">×</button>
      </div>
      <div class="detail-content" id="credentialDetail">
        <div class="empty">暂无 Codex 凭据</div>
      </div>
    </aside>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const state = {
      workspace: 'emails',
      stats: null,
      emailStatus: 'unregistered',
      emailPage: 1,
      emailPageSize: 20,
      emailQuery: '',
      selectedEmails: new Set(),
      mailPoolStatus: 'all',
      mailPoolQuery: '',
      mailPool: null,
      credentialQuery: '',
      credentials: null,
      activeCredentialId: '',
      emails: null,
      toastTimer: null,
    };

    const $ = (id) => document.getElementById(id);

    const mailPoolStatusLabels = {
      all: '全部',
      unregistered: '未注册',
      registered: '已注册',
      received: '已接码',
      failed: '失败',
      reserved: '占用中',
    };

    const emailStatusLabels = {
      unregistered: '未注册',
      registered: '已注册',
      received: '已接码',
      failed: '失败',
    };

    function toast(message) {
      const el = $('toast');
      el.textContent = message;
      el.classList.add('show');
      clearTimeout(state.toastTimer);
      state.toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
    }

    function fallbackCopyText(text) {
      const input = document.createElement('textarea');
      input.value = text;
      input.setAttribute('readonly', '');
      input.style.position = 'fixed';
      input.style.left = '-9999px';
      input.style.top = '0';
      document.body.appendChild(input);
      input.select();
      document.execCommand('copy');
      input.remove();
    }

    async function copyText(value, label = '内容') {
      const text = String(value || '').trim();
      if (!text) {
        toast('没有可复制的内容');
        return;
      }
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          fallbackCopyText(text);
        }
        toast(`${label}已复制`);
      } catch (err) {
        fallbackCopyText(text);
        toast(`${label}已复制`);
      }
    }

    async function api(path, options = {}) {
      const init = {
        method: options.method || 'GET',
        headers: { 'Content-Type': 'application/json' },
      };
      if (options.body !== undefined) {
        init.body = JSON.stringify(options.body);
      }
      const res = await fetch(path, init);
      const payload = await res.json().catch(() => ({ code: res.status, message: '接口返回不是 JSON' }));
      if (!res.ok || payload.code !== 0) {
        throw new Error(payload.message || '请求失败');
      }
      return payload.data;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (ch) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
      }[ch]));
    }

    function formatTime(ts) {
      if (!ts) return '-';
      const date = new Date(Number(ts) * 1000);
      if (Number.isNaN(date.getTime())) return '-';
      return date.toLocaleString('zh-CN', { hour12: false });
    }

    function formatAnyTime(value) {
      if (!value) return '-';
      const numeric = Number(value);
      const date = Number.isFinite(numeric) && String(value).trim().match(/^\d+$/)
        ? new Date(numeric * 1000)
        : new Date(value);
      if (Number.isNaN(date.getTime())) return '-';
      return date.toLocaleString('zh-CN', { hour12: false });
    }

    function compact(value, head = 12, tail = 8) {
      const text = String(value || '-');
      if (text.length <= head + tail + 3) return text;
      return `${text.slice(0, head)}...${text.slice(-tail)}`;
    }

    function copyButton(value, label, visibleText = value) {
      const text = String(value || '').trim();
      if (!text) return escapeHtml(visibleText || '-');
      return `<button class="copy-button" type="button" data-copy-text="${escapeHtml(text)}" data-copy-label="${escapeHtml(label)}" title="点击复制${escapeHtml(label)}">${escapeHtml(visibleText || text)}</button>`;
    }

    function normalizeEmailValue(value) {
      return String(value || '').trim().toLowerCase();
    }

    function canExportEmail(item) {
      return ['registered', 'received'].includes(item?.register_status);
    }

    function statusOptions(labels, current) {
      return Object.entries(labels).map(([value, label]) => (
        `<option value="${escapeHtml(value)}" ${value === current ? 'selected' : ''}>${escapeHtml(label)}</option>`
      )).join('');
    }

    function emailRegisterLabel(item) {
      if (item?.register_status === 'failed') return '失败';
      if (item?.register_status === 'received') return `已接码：${formatTime(item.code_received_at)}`;
      if (item?.register_status === 'registered') return `已注册：${formatTime(item.registered_at)}`;
      return item?.reserved_at ? `占用中：${formatTime(item.reserved_at)}` : '未注册';
    }

    async function loadStats() {
      const data = await api('/api/stats');
      state.stats = data;
      $('statEmailsAvailable').textContent = data.emails_available ?? 0;
      $('statEmailsRegistered').textContent = data.emails_registered ?? data.emails_used ?? 0;
      $('statEmailsReceived').textContent = data.emails_received_code ?? 0;
      $('statEmailsFailed').textContent = data.emails_failed ?? 0;
    }

    async function addEmails() {
      const emailText = $('emailText').value.trim();
      if (!emailText) {
        toast('请先填入邮箱');
        return;
      }
      $('addEmails').disabled = true;
      try {
        const result = await api('/api/list', {
          method: 'POST',
          body: { kind: 'email', bucket: 'unregistered', text: emailText },
        });
        $('emailText').value = '';
        toast(`邮箱已写入 ${Number(result.added || 0)} 条，跳过 ${Number(result.skipped || 0)} 条`);
        await refreshAll();
      } finally {
        $('addEmails').disabled = false;
      }
    }

    async function loadEmails() {
      const params = new URLSearchParams({
        status: state.emailStatus,
        q: state.emailQuery,
        page: String(state.emailPage),
        page_size: String(state.emailPageSize),
      });
      const data = await api(`/api/emails?${params.toString()}`);
      if (Number(data.page || 1) > Number(data.total_pages || 1)) {
        state.emailPage = Number(data.total_pages || 1);
        return loadEmails();
      }
      state.emails = data;
      syncEmailSelectionWithPage();
      renderEmails();
    }

    async function loadMailPool() {
      const data = await api('/api/gpt-login/mail-pool');
      state.mailPool = data;
      renderMailPool();
    }

    async function loadCredentials() {
      const params = new URLSearchParams({ q: state.credentialQuery });
      const data = await api(`/api/codex-credentials?${params.toString()}`);
      state.credentials = data;
      const items = data.items || [];
      const hasActive = items.some((item) => String(item.id || '') === state.activeCredentialId);
      state.activeCredentialId = hasActive ? state.activeCredentialId : String(items[0]?.id || '');
      renderCredentials();
    }

    async function refreshWorkspace() {
      if (state.workspace === 'emails') {
        await loadEmails();
      } else if (state.workspace === 'mail-pool') {
        await loadMailPool();
      } else if (state.workspace === 'credentials') {
        await loadCredentials();
      }
    }

    async function refreshAll() {
      await Promise.all([loadStats(), loadEmails(), loadMailPool(), loadCredentials()]);
    }

    function currentPageEmailKeys() {
      return (state.emails?.items || [])
        .map((item) => normalizeEmailValue(item.email))
        .filter(Boolean);
    }

    function selectedExportableEmails() {
      return (state.emails?.items || [])
        .filter(canExportEmail)
        .map((item) => normalizeEmailValue(item.email))
        .filter((email) => email && state.selectedEmails.has(email));
    }

    function syncEmailSelectionWithPage() {
      const allowed = new Set(currentPageEmailKeys());
      for (const email of Array.from(state.selectedEmails)) {
        if (!allowed.has(email)) {
          state.selectedEmails.delete(email);
        }
      }
    }

    function updateEmailSelectionControls() {
      const pageEmails = currentPageEmailKeys();
      const selectedCount = state.selectedEmails.size;
      const exportCount = selectedExportableEmails().length;
      const selectAll = $('selectEmailsPage');
      if (selectAll) {
        const selectedOnPage = pageEmails.filter((email) => state.selectedEmails.has(email)).length;
        selectAll.disabled = pageEmails.length === 0;
        selectAll.checked = pageEmails.length > 0 && selectedOnPage === pageEmails.length;
        selectAll.indeterminate = selectedOnPage > 0 && selectedOnPage < pageEmails.length;
      }
      $('exportEmails').disabled = exportCount === 0;
      $('exportEmails').textContent = exportCount ? `导出账号串 (${exportCount})` : '导出账号串';
      $('deleteSelectedEmails').disabled = selectedCount === 0;
      $('deleteSelectedEmails').textContent = selectedCount ? `删除选中 (${selectedCount})` : '删除选中';
      $('updateSelectedEmailStatus').disabled = selectedCount === 0;
      $('updateSelectedEmailStatus').textContent = selectedCount ? `更新状态 (${selectedCount})` : '更新状态';
      $('emailSelectionCount').textContent = `已选 ${selectedCount}`;
    }

    function setCurrentPageEmailSelection(checked) {
      currentPageEmailKeys().forEach((email) => {
        if (checked) {
          state.selectedEmails.add(email);
        } else {
          state.selectedEmails.delete(email);
        }
      });
      renderEmails();
    }

    function filteredMailPoolRows() {
      const rows = state.mailPool?.rows || [];
      const needle = state.mailPoolQuery.trim().toLowerCase();
      return rows.filter((item) => {
        const matchesStatus = state.mailPoolStatus === 'all' || item.status === state.mailPoolStatus;
        const matchesQuery = !needle || String(item.email || '').toLowerCase().includes(needle);
        return matchesStatus && matchesQuery;
      });
    }

    function renderMailPoolSummary() {
      const el = $('mailPoolSummary');
      const summary = state.mailPool?.summary || {};
      const stats = [
        ['unregistered', '未注册'],
        ['registered', '已注册'],
        ['received', '已接码'],
        ['failed', '失败'],
        ['reserved', '占用中'],
      ];
      el.innerHTML = stats.map(([key, label]) => `
        <div class="mail-pool-stat">
          <b>${Number(summary[key] || 0)}</b>
          <span>${escapeHtml(label)}</span>
        </div>
      `).join('');
    }

    function mailPoolActionButtons(item) {
      const email = escapeHtml(item.email || '');
      const current = item.status || item.register_status || 'unregistered';
      const actions = [];
      if (current !== 'unregistered') actions.push(['unregistered', '改未注册']);
      if (current !== 'registered') actions.push(['registered', '改已注册']);
      if (current !== 'received') actions.push(['received', '改已接码']);
      if (current !== 'failed') actions.push(['failed', '标失败']);
      return actions.map(([status, label]) => (
        `<button class="small-button ${status === 'failed' ? 'danger-button' : ''}" data-mail-pool-email="${email}" data-mail-pool-next="${status}">${escapeHtml(label)}</button>`
      )).join('');
    }

    function renderMailPool() {
      updateTabs();
      renderMailPoolSummary();
      const list = $('mailPoolList');
      const rows = filteredMailPoolRows();
      if (!rows.length) {
        list.innerHTML = `<div class="empty">${state.mailPoolQuery ? '没有匹配的邮箱' : '暂无邮箱池记录'}</div>`;
        return;
      }
      list.innerHTML = `
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th class="status-col">状态</th>
                <th>邮箱</th>
                <th>更新时间</th>
                <th>占用信息</th>
                <th>原始账号串</th>
                <th class="action-col">操作</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map((item) => {
        const status = item.status || item.register_status || 'unregistered';
        const reserved = Boolean(item.is_reserved || item.reserved_at);
        return `
          <tr class="resource-row">
            <td><span class="badge ${escapeHtml(status)}">${escapeHtml(mailPoolStatusLabels[status] || status)}</span></td>
            <td>
              <div class="cell-main">
                <div class="resource-name">${copyButton(item.email || '', '邮箱', item.email || '-')}</div>
                <div class="resource-meta">${escapeHtml(item.reserved_by || 'gpt-login')}</div>
              </div>
            </td>
            <td>${formatTime(item.updated_at)}</td>
            <td>
              <div class="cell-main">
                <span>${formatTime(item.reserved_at)}</span>
                <span class="resource-meta">${reserved ? '<span class="badge reserved">占用中</span>' : escapeHtml(item.reserved_by || '-')}</span>
              </div>
            </td>
            <td class="token-cell">${escapeHtml(compact(item.raw || item.email || '', 28, 12))}</td>
            <td><div class="resource-actions">${mailPoolActionButtons(item)}</div></td>
          </tr>
        `;
              }).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function credentialFlagText(item) {
      const flags = [];
      if (item.has_access_token) flags.push('access');
      if (item.has_refresh_token) flags.push('refresh');
      if (item.has_id_token) flags.push('id');
      if (item.has_session_token) flags.push('session');
      return flags.length ? flags.join(' / ') : '无 token';
    }

    function activeCredentialItem() {
      const items = state.credentials?.items || [];
      return items.find((item) => String(item.id || '') === state.activeCredentialId) || null;
    }

    function credentialTitle(item) {
      return item?.email || item?.account_id || compact(item?.id, 16, 8);
    }

    function renderCredentialDetail() {
      const el = $('credentialDetail');
      if (!el) return;
      const item = activeCredentialItem();
      if (!item) {
        el.innerHTML = `<div class="empty">${state.credentialQuery ? '没有匹配的 Codex 凭据' : '暂无 Codex 凭据'}</div>`;
        return;
      }
      const id = String(item.id || '');
      const expiredText = formatAnyTime(item.expired);
      el.innerHTML = `
        <div class="detail-section">
          <div class="detail-row">
            <div class="detail-label">账号</div>
            <div class="detail-value">${copyButton(credentialTitle(item), '凭据标识', credentialTitle(item))}</div>
          </div>
          <div class="detail-row">
            <div class="detail-label">计划</div>
            <div class="detail-value">${escapeHtml(item.plan_type || '-')}</div>
          </div>
          <div class="detail-row">
            <div class="detail-label">来源</div>
            <div class="detail-value">${escapeHtml(item.source || '-')}</div>
          </div>
          <div class="detail-row">
            <div class="detail-label">Token</div>
            <div class="detail-value">
              <div class="token-preview">${escapeHtml(credentialFlagText(item))}<br>${escapeHtml(compact(id, 20, 12))}</div>
            </div>
          </div>
          <div class="detail-row">
            <div class="detail-label">刷新时间</div>
            <div class="detail-value">${escapeHtml(formatAnyTime(item.last_refresh))}</div>
          </div>
          <div class="detail-row">
            <div class="detail-label">过期时间</div>
            <div class="detail-value">${escapeHtml(expiredText)}</div>
          </div>
        </div>
        <div class="detail-actions">
          <button class="primary" data-credential-copy="${escapeHtml(id)}" type="button">复制完整</button>
          <button data-credential-download="${escapeHtml(id)}" type="button">下载</button>
          <button class="danger-button" data-credential-delete="${escapeHtml(id)}" type="button">删除</button>
        </div>
        <div class="detail-section">
          <div class="detail-row">
            <div class="detail-label">凭据 ID</div>
            <div class="detail-value mono">${copyButton(id, '凭据 ID', compact(id, 18, 10))}</div>
          </div>
          <div class="detail-row">
            <div class="detail-label">更新时间</div>
            <div class="detail-value">${formatTime(item.updated_at)}</div>
          </div>
        </div>
      `;
    }

    function renderCredentials() {
      updateTabs();
      const list = $('credentialList');
      const items = state.credentials?.items || [];
      if (!items.length) {
        list.innerHTML = `<div class="empty">${state.credentialQuery ? '没有匹配的 Codex 凭据' : '暂无 Codex 凭据'}</div>`;
        state.activeCredentialId = '';
        renderCredentialDetail();
        return;
      }
      list.innerHTML = `
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th class="status-col">类型</th>
                <th>凭据标识</th>
                <th>账号</th>
                <th>计划</th>
                <th>来源</th>
                <th>Token</th>
                <th>过期时间</th>
                <th class="action-col">操作</th>
              </tr>
            </thead>
            <tbody>
              ${items.map((item) => {
        const id = String(item.id || '');
        return `
          <tr class="resource-row ${id === state.activeCredentialId ? 'is-active' : ''}" data-credential-open="${escapeHtml(id)}">
            <td><span class="badge ${item.has_refresh_token ? 'completed' : 'summary'}">${item.has_refresh_token ? 'RT' : '摘要'}</span></td>
            <td>
              <div class="cell-main">
                <div class="resource-name">${copyButton(credentialTitle(item), '凭据标识', credentialTitle(item))}</div>
                <div class="resource-meta mono">ID：${copyButton(id, '凭据 ID', compact(id, 14, 8))}</div>
              </div>
            </td>
            <td>${escapeHtml(item.account_id || '-')}</td>
            <td>${escapeHtml(item.plan_type || '-')}</td>
            <td>${escapeHtml(item.source || '-')}</td>
            <td>${escapeHtml(credentialFlagText(item))}</td>
            <td>${escapeHtml(formatAnyTime(item.expired))}</td>
            <td>
              <div class="resource-actions">
                <button class="small-button" data-credential-open="${escapeHtml(id)}" type="button">查看</button>
              <button class="small-button" data-credential-copy="${escapeHtml(id)}">复制完整</button>
              <button class="small-button" data-credential-download="${escapeHtml(id)}">下载</button>
              <button class="small-button danger-button" data-credential-delete="${escapeHtml(id)}">删除</button>
              </div>
            </td>
          </tr>
        `;
              }).join('')}
            </tbody>
          </table>
        </div>
      `;
      renderCredentialDetail();
    }

    function renderEmails() {
      updateTabs();
      const list = $('emailList');
      const items = state.emails?.items || [];
      if (!items.length) {
        list.innerHTML = `<div class="empty">${state.emailQuery ? '没有匹配的邮箱' : '暂无邮箱记录'}</div>`;
        renderPager('emailPagination', state.emails || {});
        updateEmailSelectionControls();
        return;
      }

      list.innerHTML = `
        <div class="table-wrap">
          <table class="data-table email-table">
            <thead>
              <tr>
                <th class="select-col"></th>
                <th>邮箱</th>
                <th class="status-col">状态</th>
                <th>client_id</th>
                <th>refresh_token</th>
                <th>更新时间</th>
                <th class="action-col">操作</th>
              </tr>
            </thead>
            <tbody>
              ${items.map((item) => {
        const emailValue = normalizeEmailValue(item.email);
        const isSelected = state.selectedEmails.has(emailValue);
        const statusAction = `
          <select data-email-status-choice="${escapeHtml(item.email || '')}" aria-label="邮箱状态">
            ${statusOptions(emailStatusLabels, item.register_status || 'unregistered')}
          </select>
          <button class="small-button" data-email-status-update="${escapeHtml(item.email || '')}">更新</button>
        `;
        return `
          <tr class="resource-row ${isSelected ? 'is-selected' : ''}">
            <td>
              <input
                class="row-checkbox"
                type="checkbox"
                data-email-select="${escapeHtml(emailValue)}"
                aria-label="选择 ${escapeHtml(item.email || '')}"
                ${isSelected ? 'checked' : ''}
                ${emailValue ? '' : 'disabled'}
              >
            </td>
            <td>
              <div class="cell-main">
                <div class="resource-name">${copyButton(item.email || '', '邮箱', item.email || '-')}</div>
                <div class="resource-meta">${escapeHtml(emailRegisterLabel(item))}</div>
              </div>
            </td>
            <td><span class="badge ${escapeHtml(item.register_status || 'unregistered')}">${escapeHtml(emailStatusLabels[item.register_status] || item.register_status || '未注册')}</span></td>
            <td class="token-cell">${copyButton(item.client_id || '', 'client_id', compact(item.client_id, 10, 6))}</td>
            <td class="token-cell">${copyButton(item.refresh_token || '', 'refresh_token', compact(item.refresh_token, 10, 8))}</td>
            <td>${formatTime(item.updated_at || item.created_at)}</td>
            <td>
              <div class="resource-actions">
                ${statusAction}
                <button class="small-button danger-button" data-email-delete="${escapeHtml(item.email || '')}">删除</button>
              </div>
            </td>
          </tr>
        `;
              }).join('')}
            </tbody>
          </table>
        </div>
      `;
      renderPager('emailPagination', state.emails || {});
      updateEmailSelectionControls();
    }

    function renderPager(targetId, data) {
      const el = $(targetId);
      const page = Number(data.page || 1);
      const totalPages = Number(data.total_pages || 1);
      const total = Number(data.total ?? data.count ?? 0);
      const pageSize = Number(data.page_size || state.emailPageSize);
      const sizes = [10, 20, 50, 100];
      el.innerHTML = `
        <div>第 ${page} / ${totalPages} 页 · 共 ${total} 条</div>
        <div class="pager-actions">
          <select data-page-size aria-label="每页数量">
            ${sizes.map((size) => `<option value="${size}" ${size === pageSize ? 'selected' : ''}>每页 ${size}</option>`).join('')}
          </select>
          <button class="small-button" data-page-delta="-1" ${page <= 1 ? 'disabled' : ''}>上一页</button>
          <button class="small-button" data-page-delta="1" ${page >= totalPages ? 'disabled' : ''}>下一页</button>
        </div>
      `;
    }

    function updateTabs() {
      document.querySelectorAll('[data-workspace-tab]').forEach((button) => {
        button.classList.toggle('active', button.dataset.workspaceTab === state.workspace);
      });
      document.querySelectorAll('[data-workspace]').forEach((panel) => {
        panel.classList.toggle('active', panel.dataset.workspace === state.workspace);
      });
      document.querySelectorAll('[data-email-status]').forEach((button) => {
        button.classList.toggle('active', button.dataset.emailStatus === state.emailStatus);
      });
      document.querySelectorAll('[data-mail-pool-status]').forEach((button) => {
        button.classList.toggle('active', button.dataset.mailPoolStatus === state.mailPoolStatus);
      });
    }

    function downloadText(filename, text, mime = 'text/plain;charset=utf-8') {
      const blob = new Blob([text], { type: mime });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    async function exportCurrentEmails() {
      const values = selectedExportableEmails();
      if (!values.length) {
        toast('请先选择可导出的邮箱');
        return;
      }
      const data = await api('/api/emails/export', {
        method: 'POST',
        body: { values },
      });
      downloadText(data.filename || 'email-accounts.csv', data.text || '', data.mime || 'text/plain;charset=utf-8');
      toast(`已导出 ${Number(data.count || 0)} 个邮箱，并标记为已卖出`);
      state.selectedEmails.clear();
      await Promise.all([loadStats(), loadEmails()]);
    }

    async function updateEmailStatus(values, status) {
      const targets = (values || []).map(normalizeEmailValue).filter(Boolean);
      if (!targets.length) {
        toast('请先选择邮箱');
        return;
      }
      const data = await api('/api/email-status', {
        method: 'PUT',
        body: { values: targets, status },
      });
      toast(`邮箱已改为${emailStatusLabels[status] || status}：${Number(data.updated || 0)} 个`);
      state.selectedEmails.clear();
      await Promise.all([loadStats(), loadEmails(), loadMailPool()]);
    }

    async function updateSelectedEmailStatus() {
      const values = Array.from(state.selectedEmails);
      const status = $('bulkEmailStatus').value || 'registered';
      if (!values.length) {
        toast('请先选择要更新的邮箱');
        return;
      }
      if (!confirm(`确定把选中的 ${values.length} 个邮箱改为${emailStatusLabels[status] || status}？`)) return;
      await updateEmailStatus(values, status);
    }

    async function deleteEmails(values) {
      const targets = (values || []).map(normalizeEmailValue).filter(Boolean);
      if (!targets.length) {
        toast('请先选择要删除的邮箱');
        return;
      }
      const data = await api('/api/emails', {
        method: 'DELETE',
        body: { values: targets },
      });
      toast(`已删除 ${Number(data.removed || 0)} 个邮箱`);
      targets.forEach((email) => state.selectedEmails.delete(email));
      await Promise.all([loadStats(), loadEmails(), loadMailPool()]);
    }

    async function deleteSelectedEmails() {
      const values = Array.from(state.selectedEmails);
      if (!values.length) {
        toast('请先选择要删除的邮箱');
        return;
      }
      if (!confirm(`确定删除选中的 ${values.length} 个邮箱？`)) return;
      await deleteEmails(values);
    }

    async function markMailPoolEmail(email, status) {
      if (!email || !status) return;
      await api('/api/gpt-login/mail-pool/mark', {
        method: 'POST',
        body: { email, status },
      });
      toast(`已改为${mailPoolStatusLabels[status] || status}`);
      await Promise.all([loadStats(), loadEmails(), loadMailPool()]);
    }

    async function resetMailPoolReservations() {
      const summary = state.mailPool?.summary || {};
      const count = Number(summary.reserved || summary.in_progress || 0);
      if (!count) {
        toast('当前没有占用中的邮箱');
        return;
      }
      if (!confirm(`确定释放 ${count} 个占用中的邮箱？`)) return;
      await api('/api/gpt-login/mail-pool/reset', {
        method: 'POST',
        body: {},
      });
      toast(`已释放占用：${count} 个`);
      await Promise.all([loadStats(), loadEmails(), loadMailPool()]);
    }

    async function syncMailPoolSource() {
      const data = await api('/api/gpt-login/mail-pool/sync', {
        method: 'POST',
        body: {},
      });
      const source = data.sourceSync || {};
      toast(`已同步邮箱源：未注册 ${Number(source.emails_unregistered || 0)}，已注册 ${Number(source.emails_registered || 0)}，已接码 ${Number(source.emails_received || 0)}`);
      await refreshAll();
    }

    async function copyCredential(id) {
      const data = await api(`/api/codex-credentials/${encodeURIComponent(id)}`);
      await copyText(JSON.stringify(data.credential || {}, null, 2), 'Codex 凭据');
    }

    async function downloadCredential(id) {
      const data = await api(`/api/codex-credentials/${encodeURIComponent(id)}`);
      downloadText(`codex-credential-${id}.json`, JSON.stringify(data.credential || {}, null, 2), 'application/json;charset=utf-8');
      toast('Codex 凭据已下载');
    }

    async function deleteCredential(id) {
      if (!id) return;
      if (!confirm('确定删除这条 Codex 凭据？')) return;
      await api(`/api/codex-credentials/${encodeURIComponent(id)}`, {
        method: 'DELETE',
        body: {},
      });
      toast('Codex 凭据已删除');
      await loadCredentials();
    }

    function applyEmailSearch() {
      state.emailQuery = $('emailSearch').value.trim();
      state.emailPage = 1;
      state.selectedEmails.clear();
      loadEmails().catch((err) => toast(err.message));
    }

    function clearEmailSearch() {
      $('emailSearch').value = '';
      state.emailQuery = '';
      state.emailPage = 1;
      state.selectedEmails.clear();
      loadEmails().catch((err) => toast(err.message));
    }

    function applyMailPoolSearch() {
      state.mailPoolQuery = $('mailPoolSearch').value.trim();
      renderMailPool();
    }

    function clearMailPoolSearch() {
      $('mailPoolSearch').value = '';
      state.mailPoolQuery = '';
      renderMailPool();
    }

    function applyCredentialSearch() {
      state.credentialQuery = $('credentialSearch').value.trim();
      loadCredentials().catch((err) => toast(err.message));
    }

    function clearCredentialSearch() {
      $('credentialSearch').value = '';
      state.credentialQuery = '';
      loadCredentials().catch((err) => toast(err.message));
    }

    function updatePage(delta) {
      state.emailPage = Math.max(1, state.emailPage + delta);
      state.selectedEmails.clear();
      loadEmails().catch((err) => toast(err.message));
    }

    function updatePageSize(size) {
      state.emailPageSize = size;
      state.emailPage = 1;
      state.selectedEmails.clear();
      loadEmails().catch((err) => toast(err.message));
    }

    function openEmailFromMetric(status) {
      state.workspace = 'emails';
      state.emailStatus = status || 'unregistered';
      state.emailPage = 1;
      state.selectedEmails.clear();
      updateTabs();
      loadEmails().catch((err) => toast(err.message));
    }

    function bindEvents() {
      $('refreshAll').addEventListener('click', () => refreshAll().catch((err) => toast(err.message)));
      $('refreshWorkspace').addEventListener('click', () => refreshWorkspace().catch((err) => toast(err.message)));
      $('addEmails').addEventListener('click', () => addEmails().catch((err) => toast(err.message)));
      $('exportEmails').addEventListener('click', () => exportCurrentEmails().catch((err) => toast(err.message)));
      $('updateSelectedEmailStatus').addEventListener('click', () => updateSelectedEmailStatus().catch((err) => toast(err.message)));
      $('deleteSelectedEmails').addEventListener('click', () => deleteSelectedEmails().catch((err) => toast(err.message)));
      $('selectEmailsPage').addEventListener('change', (event) => {
        setCurrentPageEmailSelection(event.target.checked);
      });
      $('emailSearchForm').addEventListener('submit', (event) => {
        event.preventDefault();
        applyEmailSearch();
      });
      $('clearEmailSearch').addEventListener('click', clearEmailSearch);
      $('mailPoolSearchForm').addEventListener('submit', (event) => {
        event.preventDefault();
        applyMailPoolSearch();
      });
      $('clearMailPoolSearch').addEventListener('click', clearMailPoolSearch);
      $('credentialSearchForm').addEventListener('submit', (event) => {
        event.preventDefault();
        applyCredentialSearch();
      });
      $('clearCredentialSearch').addEventListener('click', clearCredentialSearch);
      $('syncMailPool').addEventListener('click', () => syncMailPoolSource().catch((err) => toast(err.message)));
      $('resetMailPool').addEventListener('click', () => resetMailPoolReservations().catch((err) => toast(err.message)));

      document.querySelectorAll('[data-workspace-tab]').forEach((button) => {
        button.addEventListener('click', () => {
          state.workspace = button.dataset.workspaceTab || 'emails';
          updateTabs();
          refreshWorkspace().catch((err) => toast(err.message));
        });
      });

      document.querySelectorAll('[data-open-email]').forEach((card) => {
        const open = () => openEmailFromMetric(card.dataset.emailStatus);
        card.addEventListener('click', open);
        card.addEventListener('keydown', (event) => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            open();
          }
        });
      });

      document.querySelectorAll('[data-email-status]').forEach((button) => {
        button.addEventListener('click', () => {
          state.emailStatus = button.dataset.emailStatus || 'unregistered';
          state.emailPage = 1;
          state.selectedEmails.clear();
          updateTabs();
          loadEmails().catch((err) => toast(err.message));
        });
      });

      document.querySelectorAll('[data-mail-pool-status]').forEach((button) => {
        button.addEventListener('click', () => {
          state.mailPoolStatus = button.dataset.mailPoolStatus || 'all';
          updateTabs();
          renderMailPool();
        });
      });

      document.body.addEventListener('click', (event) => {
        const copyEl = event.target.closest('[data-copy-text]');
        if (copyEl) {
          event.preventDefault();
          copyText(copyEl.dataset.copyText || '', copyEl.dataset.copyLabel || '内容');
          return;
        }

        const statusButton = event.target.closest('[data-email-status-update]');
        if (statusButton) {
          const email = statusButton.dataset.emailStatusUpdate || '';
          const row = statusButton.closest('.resource-row');
          const select = row?.querySelector('[data-email-status-choice]');
          const status = select?.value || 'registered';
          statusButton.disabled = true;
          updateEmailStatus([email], status).catch((err) => {
            toast(err.message);
          }).finally(() => {
            statusButton.disabled = false;
          });
          return;
        }

        const deleteButton = event.target.closest('[data-email-delete]');
        if (deleteButton) {
          const email = deleteButton.dataset.emailDelete || '';
          if (!email || !confirm(`确定删除邮箱 ${email}？`)) return;
          deleteButton.disabled = true;
          deleteEmails([email]).catch((err) => {
            toast(err.message);
          }).finally(() => {
            deleteButton.disabled = false;
          });
          return;
        }

        const poolButton = event.target.closest('[data-mail-pool-email][data-mail-pool-next]');
        if (poolButton) {
          const email = poolButton.dataset.mailPoolEmail || '';
          const status = poolButton.dataset.mailPoolNext || '';
          poolButton.disabled = true;
          markMailPoolEmail(email, status).catch((err) => {
            toast(err.message);
          }).finally(() => {
            poolButton.disabled = false;
          });
          return;
        }

        const credentialCopy = event.target.closest('[data-credential-copy]');
        if (credentialCopy) {
          credentialCopy.disabled = true;
          copyCredential(credentialCopy.dataset.credentialCopy || '').catch((err) => {
            toast(err.message);
          }).finally(() => {
            credentialCopy.disabled = false;
          });
          return;
        }

        const credentialDownload = event.target.closest('[data-credential-download]');
        if (credentialDownload) {
          credentialDownload.disabled = true;
          downloadCredential(credentialDownload.dataset.credentialDownload || '').catch((err) => {
            toast(err.message);
          }).finally(() => {
            credentialDownload.disabled = false;
          });
          return;
        }

        const credentialDelete = event.target.closest('[data-credential-delete]');
        if (credentialDelete) {
          credentialDelete.disabled = true;
          deleteCredential(credentialDelete.dataset.credentialDelete || '').catch((err) => {
            toast(err.message);
          }).finally(() => {
            credentialDelete.disabled = false;
          });
          return;
        }

        const credentialOpen = event.target.closest('[data-credential-open]');
        if (credentialOpen) {
          state.activeCredentialId = credentialOpen.dataset.credentialOpen || '';
          renderCredentials();
          renderCredentialDetail();
        }
      });

      $('emailList').addEventListener('change', (event) => {
        const input = event.target.closest('[data-email-select]');
        if (!input) return;
        const email = input.dataset.emailSelect || '';
        if (input.checked) {
          state.selectedEmails.add(email);
        } else {
          state.selectedEmails.delete(email);
        }
        renderEmails();
      });

      $('emailPagination').addEventListener('click', (event) => {
        const button = event.target.closest('[data-page-delta]');
        if (!button) return;
        updatePage(Number(button.dataset.pageDelta || 0));
      });

      $('emailPagination').addEventListener('change', (event) => {
        const select = event.target.closest('[data-page-size]');
        if (!select) return;
        updatePageSize(Number(select.value || 20));
      });
    }

    async function init() {
      bindEvents();
      updateTabs();
      try {
        await refreshAll();
      } catch (err) {
        toast(err.message);
      }
    }

    init();
  </script>
</body>
</html>
